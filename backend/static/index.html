<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Augusta PM Agent</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/marked@9/marked.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── Light mode (default) ── */
:root {
  --bg:      #ffffff;
  --bg2:     #f7f7f7;
  --bg3:     #f0f0f0;
  --border:  #e5e5e5;
  --border2: #d4d4d4;
  --text:    #111111;
  --text2:   #555555;
  --text3:   #999999;
  --topbar-bg: #ffffff;
  --btn-solid-bg: #111111;
  --btn-solid-hover: #333333;
  --error-bg: #fff5f5;
  --error-border: #fecaca;
  --error-text: #c00000;
}

/* ── Dark mode ── */
:root.dark {
  --bg:      #111111;
  --bg2:     #1a1a1a;
  --bg3:     #222222;
  --border:  #2e2e2e;
  --border2: #3a3a3a;
  --text:    #f0f0f0;
  --text2:   #a0a0a0;
  --text3:   #606060;
  --topbar-bg: #111111;
  --btn-solid-bg: #f0f0f0;
  --btn-solid-hover: #cccccc;
  --error-bg: #2a1515;
  --error-border: #7a2020;
  --error-text: #ff6b6b;
}

html, body, #root { height: 100%; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 13px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  transition: background 0.2s, color 0.2s;
}

::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text3); }

/* ── Markdown ── */
.md h1 { font-size: 1.1em; font-weight: 700; color: var(--text); margin: 1.1em 0 0.45em; }
.md h2 { font-size: 1em; font-weight: 600; color: var(--text); margin: 0.9em 0 0.35em; padding-bottom: 0.3em; border-bottom: 1px solid var(--border); }
.md h3 { font-size: 0.9em; font-weight: 600; color: var(--text); margin: 0.75em 0 0.3em; }
.md p  { margin: 0.5em 0; color: var(--text2); }
.md ul, .md ol { margin: 0.4em 0; padding-left: 1.4em; }
.md li { margin: 0.2em 0; color: var(--text2); }
.md strong { color: var(--text); font-weight: 600; }
.md em { color: var(--text3); font-style: italic; }
.md code { background: var(--bg2); color: var(--text); padding: 0.1em 0.3em; border-radius: 3px; font-size: 0.85em; font-family: 'SF Mono','Fira Code',monospace; border: 1px solid var(--border); }
.md pre  { background: var(--bg2); border: 1px solid var(--border); border-radius: 4px; padding: 0.9em; overflow-x: auto; margin: 0.6em 0; }
.md pre code { background: none; border: none; padding: 0; }
.md blockquote { border-left: 2px solid var(--border2); padding-left: 1em; margin: 0.6em 0; color: var(--text3); }
.md table { width: 100%; border-collapse: collapse; margin: 0.7em 0; font-size: 0.9em; }
.md th { background: var(--bg2); padding: 0.4em 0.65em; text-align: left; border-bottom: 1px solid var(--border); font-weight: 600; }
.md td { padding: 0.4em 0.65em; border-bottom: 1px solid var(--border); color: var(--text2); }
.md tr:hover td { background: var(--bg2); }
.md a  { color: var(--text); text-decoration: underline; text-underline-offset: 2px; }
.md hr { border: none; border-top: 1px solid var(--border); margin: 1em 0; }

/* ── Animations ── */
@keyframes fadeIn { from { opacity:0; transform:translateY(3px); } to { opacity:1; transform:translateY(0); } }
@keyframes spin   { to { transform: rotate(360deg); } }
.fade-in { animation: fadeIn 0.18s ease-out; }

/* ── App shell ── */
.app { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

/* ── Top bar ── */
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  height: 48px; padding: 0 20px; flex-shrink: 0;
  background: var(--topbar-bg); border-bottom: 1px solid var(--border);
  position: relative; z-index: 10;
}

/* ── Logo ── */
.logo { display: flex; align-items: center; gap: 10px; }
.logo-img { height: 34px; width: auto; object-fit: contain; display: block; flex-shrink: 0; }

.topbar-right { display: flex; align-items: center; gap: 14px; font-size: 12px; color: var(--text3); }

/* ── Dark mode toggle button ── */
.dm-toggle {
  width: 30px; height: 30px; border-radius: 5px;
  display: flex; align-items: center; justify-content: center;
  border: 1px solid var(--border); background: var(--bg2);
  cursor: pointer; transition: background 0.15s, border-color 0.15s;
  flex-shrink: 0;
}
.dm-toggle:hover { background: var(--bg3); border-color: var(--border2); }
.dm-toggle svg { display: block; }

/* ── Main body ── */
.main { display: flex; flex: 1; overflow: hidden; }

/* ── Left sidebar ── */
.sidebar {
  width: 232px; flex-shrink: 0;
  border-right: 1px solid var(--border);
  background: var(--bg);
  display: flex; flex-direction: column;
  overflow-y: auto;
}
.sidebar-header {
  padding: 16px 16px 10px;
  font-size: 10px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.08em; color: var(--text3);
  flex-shrink: 0;
}
.client-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 14px; cursor: pointer;
  border-left: 2px solid transparent;
  transition: background 0.1s;
  position: relative;
}
.client-item:hover { background: var(--bg2); }
.client-item.active { background: var(--bg2); border-left-color: var(--text); }
.client-avatar {
  width: 30px; height: 30px; border-radius: 5px; flex-shrink: 0;
  background: var(--bg3); border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 600; color: var(--text2);
}
.client-item.active .client-avatar { background: var(--text); color: var(--bg); border-color: var(--text); }
.client-info { flex: 1; min-width: 0; }
.client-name { font-size: 13px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.client-industry { font-size: 11px; color: var(--text3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }
.client-mem-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text); flex-shrink: 0; }

.sidebar-footer {
  margin-top: auto; padding: 12px 14px;
  border-top: 1px solid var(--border); flex-shrink: 0;
}

/* ── Center workspace ── */
.workspace {
  flex: 1; overflow-y: auto;
  padding: 0;
  background: var(--bg);
}

/* ── Workspace header ── */
.ws-header {
  padding: 28px 36px 22px;
  border-bottom: 1px solid var(--border);
}
.ws-client-label {
  font-size: 10px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.08em; color: var(--text3); margin-bottom: 6px;
}
.ws-title { font-size: 20px; font-weight: 700; color: var(--text); letter-spacing: -0.4px; line-height: 1.2; }
.ws-subtitle { font-size: 13px; color: var(--text3); margin-top: 4px; }
.ws-meta { display: flex; align-items: center; gap: 16px; margin-top: 12px; }
.ws-meta-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--text2); }
.ws-meta-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--border2); }

/* ── Section ── */
.ws-section { padding: 0 36px 0; }
.ws-section-title {
  font-size: 10px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.08em; color: var(--text3);
  padding: 22px 0 12px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 0;
  display: flex; align-items: center; justify-content: space-between;
}

/* ── Transcript card ── */
.tx-card {
  border: 1px solid var(--border); border-radius: 5px;
  margin: 12px 0; background: var(--bg); overflow: hidden;
}
.tx-card-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 13px 16px;
}
.tx-card-left { display: flex; align-items: center; gap: 12px; flex: 1; min-width: 0; }
.tx-call-num {
  font-size: 10px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.07em; color: var(--text3);
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 3px; padding: 2px 7px; flex-shrink: 0;
}
.tx-title { font-size: 13px; font-weight: 500; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.tx-date  { font-size: 11px; color: var(--text3); margin-top: 1px; }
.tx-card-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

/* ── Outputs zone inside transcript card ── */
.tx-outputs {
  border-top: 1px solid var(--border);
  background: var(--bg2);
  padding: 14px 16px;
}
.tx-outputs-label {
  font-size: 10px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.07em; color: var(--text3); margin-bottom: 10px;
}
.tx-loading {
  display: flex; align-items: center; gap: 10px;
  padding: 14px 16px; border-top: 1px solid var(--border);
  background: var(--bg2); font-size: 12px; color: var(--text3);
}

/* ── Other events section ── */
.event-card {
  border: 1px solid var(--border); border-radius: 5px;
  margin: 12px 0; background: var(--bg); overflow: hidden;
}
.event-card-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 13px 16px;
}
.event-card-left { flex: 1; min-width: 0; }
.event-card-title { font-size: 13px; font-weight: 500; color: var(--text); }
.event-card-desc  { font-size: 11px; color: var(--text3); margin-top: 2px; }

/* ── Inline email preview ── */
.email-banner {
  border-top: 1px solid var(--border); background: var(--bg2);
  padding: 10px 16px;
}
.email-banner-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text3); margin-bottom: 5px; }
.email-banner-subject { font-size: 12px; font-weight: 500; color: var(--text); }
.email-banner-from { font-size: 11px; color: var(--text3); margin-top: 1px; }
.email-banner-preview { font-size: 11.5px; color: var(--text2); margin-top: 6px; line-height: 1.6; }

/* ── Output panel ── */
.output-panel {
  border: 1px solid var(--border); border-radius: 4px;
  background: var(--bg); margin-bottom: 8px; overflow: hidden;
}
.output-panel:last-child { margin-bottom: 0; }
.output-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 9px 13px; cursor: pointer; user-select: none;
  transition: background 0.1s;
}
.output-head:hover { background: var(--bg3); }
.output-head.open  { border-bottom: 1px solid var(--border); }
.output-head-left  { display: flex; align-items: center; gap: 8px; }
.output-type-tag {
  font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em;
  color: var(--text3); border: 1px solid var(--border); border-radius: 3px; padding: 2px 5px;
}
.output-title { font-size: 12.5px; font-weight: 500; color: var(--text); }
.output-chevron { font-size: 9px; color: var(--text3); flex-shrink: 0; }
.output-body { padding: 16px 18px; max-height: 520px; overflow-y: auto; }

/* ── Buttons ── */
button { cursor: pointer; font-family: inherit; border: none; outline: none; background: none; }

.btn {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 12px; font-weight: 500; padding: 6px 12px; border-radius: 4px;
  transition: background 0.1s, color 0.1s, border-color 0.1s;
}
.btn-solid   { background: var(--text); color: var(--bg); border: 1px solid var(--text); }
.btn-solid:hover:not(:disabled) { opacity: 0.85; }
.btn-outline { background: var(--bg); color: var(--text2); border: 1px solid var(--border); }
.btn-outline:hover:not(:disabled) { background: var(--bg2); color: var(--text); border-color: var(--border2); }
.btn-ghost   { color: var(--text2); padding: 5px 9px; border-radius: 3px; }
.btn-ghost:hover:not(:disabled) { background: var(--bg2); color: var(--text); }
.btn-danger  { color: var(--text3); font-size: 11px; padding: 3px 7px; border-radius: 3px; border: 1px solid var(--border); }
.btn-danger:hover { color: var(--error-text); background: var(--error-bg); border-color: var(--error-border); }
.btn-sm { padding: 4px 9px; font-size: 11px; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* ── Copy button ── */
.copy-btn {
  display: inline-flex; align-items: center; gap: 4px; font-size: 11px;
  padding: 2px 7px; border-radius: 3px; border: 1px solid var(--border);
  color: var(--text3); transition: all 0.1s; background: var(--bg);
}
.copy-btn:hover { border-color: var(--border2); color: var(--text); background: var(--bg2); }

/* ── Status badge ── */
.badge {
  display: inline-flex; align-items: center; font-size: 10px; font-weight: 500;
  padding: 2px 7px; border-radius: 3px; text-transform: capitalize;
  background: var(--bg2); color: var(--text2); border: 1px solid var(--border);
}

/* ── Spinner ── */
.spinner-sm {
  display: inline-block; width: 13px; height: 13px; border-radius: 50%; flex-shrink: 0;
  border: 1.5px solid var(--border); border-top-color: var(--text);
  animation: spin 0.7s linear infinite;
}
.spinner-md {
  display: inline-block; width: 20px; height: 20px; border-radius: 50%; flex-shrink: 0;
  border: 2px solid var(--border); border-top-color: var(--text);
  animation: spin 0.7s linear infinite;
}

/* ── Error bar ── */
.error-bar {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 9px 13px; background: var(--error-bg); border: 1px solid var(--error-border);
  border-radius: 4px; margin: 8px 0;
}
.error-bar-msg  { flex: 1; font-size: 12px; color: var(--error-text); }
.error-bar-close { color: var(--text3); cursor: pointer; font-size: 15px; line-height: 1; padding: 0; flex-shrink: 0; }

/* ── Empty state ── */
.empty-state {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; height: 100%; padding: 60px 40px;
  text-align: center;
}
.empty-title { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
.empty-desc  { font-size: 13px; color: var(--text3); max-width: 340px; line-height: 1.7; }
.empty-grid  { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 24px; max-width: 400px; width: 100%; }
.empty-card  { border: 1px solid var(--border); border-radius: 4px; padding: 13px; text-align: left; background: var(--bg); }
.empty-card-t { font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 3px; }
.empty-card-d { font-size: 11px; color: var(--text3); line-height: 1.5; }

/* ── Right panel ── */
.right-panel {
  width: 296px; flex-shrink: 0;
  border-left: 1px solid var(--border);
  background: var(--bg);
  display: flex; flex-direction: column;
  overflow-y: auto;
}
.rp-section { padding: 16px; border-bottom: 1px solid var(--border); }
.rp-section:last-child { border-bottom: none; }
.rp-label {
  font-size: 10px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.08em; color: var(--text3); margin-bottom: 10px;
}

/* ── Memory panel ── */
.mem-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }
.mem-stat { padding: 8px 4px; text-align: center; border-right: 1px solid var(--border); }
.mem-stat:last-child { border-right: none; }
.mem-stat-val  { font-size: 16px; font-weight: 700; color: var(--text); }
.mem-stat-lbl  { font-size: 10px; color: var(--text3); margin-top: 1px; }
.mem-events { margin-top: 10px; }
.mem-event-row {
  display: flex; align-items: flex-start; gap: 8px;
  padding: 5px 0; border-bottom: 1px solid var(--border);
  font-size: 11.5px;
}
.mem-event-row:last-child { border-bottom: none; }
.mem-event-type { flex-shrink: 0; }
.mem-event-summary { flex: 1; color: var(--text2); line-height: 1.4; }
.mem-event-date { font-size: 10px; color: var(--text3); flex-shrink: 0; margin-top: 1px; }
.mem-open-items { margin-top: 8px; }
.mem-open-item { display: flex; align-items: flex-start; gap: 6px; font-size: 11.5px; color: var(--text2); padding: 3px 0; }
.mem-open-dash { color: var(--text3); flex-shrink: 0; }

/* ── Chat ── */
.chat-wrap {
  display: flex; flex-direction: column; flex: 1;
  border: 1px solid var(--border); border-radius: 4px; overflow: hidden;
  min-height: 320px; max-height: 440px;
}
.chat-titlebar {
  padding: 8px 11px; border-bottom: 1px solid var(--border);
  font-size: 11px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.07em; color: var(--text3); background: var(--bg2);
}
.chat-msgs {
  flex: 1; overflow-y: auto; padding: 10px;
  display: flex; flex-direction: column; gap: 7px;
}
.chat-empty-state {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; height: 100%; gap: 12px; text-align: center;
}
.chat-suggestions { display: flex; flex-direction: column; gap: 4px; width: 100%; }
.chat-suggestion {
  text-align: left; font-size: 11.5px; padding: 6px 9px;
  border-radius: 3px; border: 1px solid var(--border);
  color: var(--text2); cursor: pointer; transition: all 0.1s; background: var(--bg);
}
.chat-suggestion:hover { background: var(--bg2); color: var(--text); }
.msg { display: flex; }
.msg.user { justify-content: flex-end; }
.msg-bubble {
  max-width: 86%; padding: 7px 10px; font-size: 12px; line-height: 1.5; border-radius: 4px;
}
.msg.user      .msg-bubble { background: var(--text); color: var(--bg); }
.msg.assistant .msg-bubble { background: var(--bg2); color: var(--text); border: 1px solid var(--border); }
.chat-input-row {
  display: flex; gap: 5px; align-items: flex-end;
  padding: 7px; border-top: 1px solid var(--border); background: var(--bg);
}
.chat-input {
  flex: 1; resize: none; border-radius: 3px; padding: 6px 9px;
  background: var(--bg2); border: 1px solid var(--border);
  color: var(--text); font-size: 12px; font-family: inherit; outline: none;
  min-height: 32px; max-height: 72px; transition: border-color 0.15s;
}
.chat-input:focus { border-color: var(--border2); }
.chat-input::placeholder { color: var(--text3); }
.chat-send {
  width: 30px; height: 30px; border-radius: 3px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  background: var(--text); color: var(--bg); font-size: 13px; transition: opacity 0.1s;
}
.chat-send:hover:not(:disabled) { opacity: 0.8; }
.chat-send:disabled { background: var(--bg3); color: var(--text3); cursor: not-allowed; }

/* ── Insights panel ── */
.insight-group { padding: 8px 0; border-bottom: 1px solid var(--border); }
.insight-group:last-child { border-bottom: none; }
.insight-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text3); margin-bottom: 5px; }
.insight-row { display: flex; align-items: flex-start; gap: 6px; margin-bottom: 4px; font-size: 12px; color: var(--text2); }
.insight-mark { flex-shrink: 0; color: var(--text3); font-size: 11px; margin-top: 1px; }

/* ── Misc ── */
.divider { height: 1px; background: var(--border); margin: 10px 0; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

async function apiFetch(path, opts = {}) {
  const res = await fetch(path, {
    headers: { 'Content-Type': 'application/json' },
    ...opts,
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({ detail: res.statusText }));
    throw new Error(err.detail || 'Request failed');
  }
  return res.json();
}

// ── Dark-mode hook ────────────────────────────────────────────────
function useDarkMode() {
  const [dark, setDark] = useState(() => {
    try { return localStorage.getItem('augusta-theme') === 'dark'; } catch { return false; }
  });

  useEffect(() => {
    const root = document.documentElement;
    if (dark) {
      root.classList.add('dark');
    } else {
      root.classList.remove('dark');
    }
    try { localStorage.setItem('augusta-theme', dark ? 'dark' : 'light'); } catch {}
  }, [dark]);

  return [dark, () => setDark(d => !d)];
}

// ── Markdown ─────────────────────────────────────────────────────
function MD({ src }) {
  const html = marked.parse(src || '', { breaks: true });
  return <div className="md" dangerouslySetInnerHTML={{ __html: html }} />;
}

// ── Copy button ───────────────────────────────────────────────────
function CopyBtn({ text }) {
  const [ok, setOk] = useState(false);
  const go = e => {
    e.stopPropagation();
    navigator.clipboard.writeText(text);
    setOk(true);
    setTimeout(() => setOk(false), 1800);
  };
  return <button className="copy-btn" onClick={go}>{ok ? '✓ Copied' : 'Copy'}</button>;
}

// ── Output panel (collapsible) ────────────────────────────────────
const OUTPUT_TAG = {
  email:           'Email',
  proposal:        'Proposal',
  team_plan:       'Team Plan',
  meeting_prep:    'Meeting Prep',
  research_report: 'Research',
  email_reply:     'Email Reply',

function OutputPanel({ output, defaultOpen = true }) {
  const [open, setOpen] = useState(defaultOpen);
  const tag = OUTPUT_TAG[output.type] || output.type;
  const cleanTitle = (output.title || '').replace(/^[\u{1F300}-\u{1FFFF}\u2600-\u27FF\s]+/u, '').trim() || tag;
  return (
    <div className="output-panel fade-in">
      <div className={`output-head ${open ? 'open' : ''}`} onClick={() => setOpen(o => !o)}>
        <div className="output-head-left">
          <span className="output-type-tag">{tag}</span>
          <span className="output-title">{cleanTitle}</span>
        </div>
        <div style={{ display:'flex', alignItems:'center', gap:7 }}>

// ── Transcript card ───────────────────────────────────────────────
function TranscriptCard({ transcript, index, clientId, persistedOutputs, onRun }) {
  const [loading, setLoading] = useState(false);
  const [error, setError]     = useState(null);
  const [showOutputs, setShowOutputs] = useState(false);

  const hasOutputs = persistedOutputs && persistedOutputs.length > 0;

  useEffect(() => {
    if (!hasOutputs) setShowOutputs(false);
  }, [hasOutputs]);

  const run = async () => {
    if (loading) return;
    setLoading(true);
    setError(null);
    try {
      const res = await apiFetch('/api/events/transcript', {
        method: 'POST',
        body: JSON.stringify({ client_id: clientId, transcript_id: transcript.id }),
      });
      const generated = Object.values(res.outputs || {});
      onRun({ transcriptId: transcript.id, outputs: generated, insights: res.insights || null });
      setShowOutputs(true);
    } catch (e) {
      setError(e.message);
    } finally {
      setLoading(false);
    }
  };

  return (
    <div className="tx-card fade-in">
      <div className="tx-card-head">
        <div className="tx-card-left">
          <span className="tx-call-num">Call {index + 1}</span>
          <div>
            <div className="tx-title">{transcript.title}</div>
            <div className="tx-date">{transcript.date}</div>
          </div>
        </div>
        <div className="tx-card-right">
          {hasOutputs && (
            <span className="badge">{persistedOutputs.length} output{persistedOutputs.length !== 1 ? 's' : ''}</span>
          )}
          {hasOutputs && (
            <button className="btn btn-outline btn-sm" onClick={() => setShowOutputs(v => !v)}>
              {showOutputs ? 'Hide ▲' : 'Show ▼'}
            </button>
          )}
          <button
            className="btn btn-solid btn-sm"
            disabled={loading}
            style={{ display: hasOutputs ? 'none' : undefined }}
            onClick={run}
          >
            {loading ? <><span className="spinner-sm" /> Running…</> : 'Run'}
          </button>
        </div>
      </div>

      {error && (
        <div style={{ padding: '0 16px 12px' }}>
          <div className="error-bar">
            <span className="error-bar-msg">{error}</span>
            <button className="error-bar-close" onClick={() => setError(null)}>×</button>
          </div>
        </div>
      )}

      {loading && (
        <div className="tx-loading">
          <span className="spinner-sm" />
          <span>Analyzing transcript, extracting insights, generating outputs…</span>
        </div>
      )}

      {!loading && hasOutputs && showOutputs && (
        <div className="tx-outputs fade-in">
          <div className="tx-outputs-label">Generated outputs</div>
          {persistedOutputs.map((o, i) => (
            <OutputPanel key={o.id || i} output={o} defaultOpen={i === 0} />
          ))}
        </div>
      )}
    </div>
  );
}

// ── Event card (meeting / email) ──────────────────────────────────
function EventCard({ title, desc, clientId, eventType, persistedOutputs, persistedEmail, onRun }) {
  const [loading, setLoading] = useState(false);
  const [error, setError]     = useState(null);

  const hasOutputs = persistedOutputs && persistedOutputs.length > 0;

  const run = async () => {
    if (loading) return;
    setLoading(true);
    setError(null);
    try {
      let res;
      if (eventType === 'meeting') {
        res = await apiFetch('/api/events/meeting', {
          method: 'POST',
          body: JSON.stringify({ client_id: clientId }),
        });
      } else {
        res = await apiFetch('/api/events/email', {
          method: 'POST',
          body: JSON.stringify({ client_id: clientId }),
        });
      }
      const generated = Object.values(res.outputs || {});
      onRun({ eventType, outputs: generated, incomingEmail: res.incoming_email || null });
    } catch (e) {
      setError(e.message);
    } finally {
      setLoading(false);
    }
  };

  return (
    <div className="event-card fade-in">
      <div className="event-card-head">
        <div className="event-card-left">
          <div className="event-card-title">{title}</div>
          <div className="event-card-desc">{desc}</div>
        </div>
        <div style={{ display:'flex', alignItems:'center', gap:8, flexShrink:0, marginLeft:12 }}>
          {hasOutputs && (
            <span className="badge">{persistedOutputs.length} output{persistedOutputs.length !== 1 ? 's' : ''}</span>
          )}
          <button className="btn btn-outline btn-sm" disabled={loading} onClick={run}>
            {loading ? <><span className="spinner-sm" /> Running…</> : 'Run'}
          </button>
        </div>
      </div>

      {error && (
        <div style={{ padding: '0 16px 12px' }}>
          <div className="error-bar">
            <span className="error-bar-msg">{error}</span>
            <button className="error-bar-close" onClick={() => setError(null)}>×</button>
          </div>
        </div>
      )}

      {!loading && persistedEmail && (
        <div className="email-banner">
          <div className="email-banner-label">Incoming email</div>
          <div className="email-banner-subject">{persistedEmail.subject}</div>
          <div className="email-banner-from">From: {persistedEmail.from}</div>
          {persistedEmail.preview && (
            <div className="email-banner-preview">{persistedEmail.preview}</div>
          )}
        </div>
      )}

      {loading && (
        <div className="tx-loading">
          <span className="spinner-sm" />
          <span>
            {eventType === 'meeting'
              ? 'Checking project memory, preparing briefing…'
              : 'Reading email, checking context, drafting response…'}
          </span>
        </div>
      )}

      {!loading && hasOutputs && (
        <div className="tx-outputs fade-in">
          <div className="tx-outputs-label">Generated outputs</div>
          {persistedOutputs.map((o, i) => (
            <OutputPanel key={o.id || i} output={o} defaultOpen={i === 0} />
          ))}
        </div>
      )}
    </div>
  );
}

// ── Chat panel ────────────────────────────────────────────────────
function ChatPanel({ clientId, companyName }) {
  const [msgs, setMsgs]       = useState([]);
  const [input, setInput]     = useState('');
  const [loading, setLoading] = useState(false);
  const bottomRef = useRef(null);

  useEffect(() => { bottomRef.current?.scrollIntoView({ behavior:'smooth' }); }, [msgs]);

  const send = async (text) => {
    const t = (text || input).trim();
    if (!t || loading) return;
    const newMsgs = [...msgs, { role:'user', content:t }];
    setMsgs(newMsgs);
    setInput('');
    setLoading(true);
    try {
      const data = await apiFetch('/api/chat', {
        method: 'POST',
        body: JSON.stringify({ client_id: clientId, messages: newMsgs }),
      });
      setMsgs([...newMsgs, { role:'assistant', content: data.response }]);
    } catch (e) {
      setMsgs([...newMsgs, { role:'assistant', content:`Error: ${e.message}` }]);
    } finally {
      setLoading(false);
    }
  };

  const SUGGESTIONS = [
    'What are the open action items?',
    'What risks should I watch for?',
    'Summarize the project status',
    'What should I prep for the next call?',
  ];

  return (
    <div className="chat-wrap">
      <div className="chat-titlebar">Chat — {companyName}</div>
      <div className="chat-msgs">
        {msgs.length === 0 ? (
          <div className="chat-empty-state">
            <div>
              <div style={{ fontSize:12.5, fontWeight:600, color:'var(--text)', marginBottom:2 }}>Ask about {companyName}</div>
              <div style={{ fontSize:11.5, color:'var(--text3)' }}>Full project context available</div>
            </div>
            <div className="chat-suggestions">
              {SUGGESTIONS.map(q => (
                <button key={q} className="chat-suggestion" onClick={() => send(q)}>{q}</button>
              ))}
            </div>
          </div>
        ) : (
          msgs.map((m,i) => (
            <div key={i} className={`msg ${m.role}`}>
              <div className="msg-bubble">
                {m.role === 'assistant' ? <MD src={m.content} /> : m.content}
              </div>
            </div>
          ))
        )}
        {loading && (
          <div className="msg assistant">
            <div className="msg-bubble"><span className="spinner-sm" /></div>
          </div>
        )}
        <div ref={bottomRef} />
      </div>
      <div className="chat-input-row">
        <textarea
          className="chat-input"
          placeholder="Ask anything about this engagement…"
          value={input}
          rows={1}
          onChange={e => setInput(e.target.value)}
          onKeyDown={e => { if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); send(); }}}
          onInput={e => { e.target.style.height='auto'; e.target.style.height = Math.min(e.target.scrollHeight,72)+'px'; }}
        />
        <button className="chat-send" disabled={!input.trim()||loading} onClick={() => send()}>↑</button>
      </div>
    </div>
  );
}

// ── Client workspace ──────────────────────────────────────────────
function Workspace({ client, memory, onMemoryChange }) {
  const [txOutputs, setTxOutputs]           = useState({});
  const [eventOutputs, setEventOutputs]     = useState({});
  const [emailMeta, setEmailMeta]           = useState(null);
  const [latestInsights, setLatestInsights] = useState(null);
  const [outputsLoading, setOutputsLoading] = useState(true);

  const attendeeCount = (client.attendees || []).length;
  const augusta       = client.augusta_team || [];

  useEffect(() => {
    let cancelled = false;
    setOutputsLoading(true);
    setTxOutputs({});
    setEventOutputs({});
    setEmailMeta(null);
    setLatestInsights(null);

    apiFetch(`/api/clients/${client.client_id}/outputs`)
      .then(data => {
        if (cancelled) return;
        const allOutputs    = data.outputs || [];
        const newTxOutputs  = {};
        const newEvtOutputs = {};
        const norm = v => (v || '').replace(/\s+/g, ' ').trim().toLowerCase();
        const chronological = [...allOutputs].reverse();

        chronological.forEach(o => {
          if (o.event_type === 'transcript') {
            const matchTx = (client.transcripts || []).find(t =>
              t.id === o.transcript_id || norm(t.title) === norm(o.transcript_title)
            );
            const key = matchTx ? matchTx.id : '__unmatched__';
            if (!newTxOutputs[key]) newTxOutputs[key] = [];
            newTxOutputs[key].push(o);
          } else if (o.event_type === 'upcoming_meeting') {
            if (!newEvtOutputs['meeting']) newEvtOutputs['meeting'] = [];
            newEvtOutputs['meeting'].push(o);
          } else if (o.event_type === 'email_reply') {
            if (!newEvtOutputs['email']) newEvtOutputs['email'] = [];
            newEvtOutputs['email'].push(o);
          }
        });

        setTxOutputs(newTxOutputs);
        setEventOutputs(newEvtOutputs);
      })
      .catch(() => {})
      .finally(() => { if (!cancelled) setOutputsLoading(false); });

    return () => { cancelled = true; };
  }, [client.client_id]);

  const handleTranscriptRun = useCallback(({ transcriptId, outputs, insights }) => {
    setTxOutputs(prev => ({
      ...prev,
      [transcriptId]: [...(prev[transcriptId] || []), ...outputs],
    }));
    if (insights) setLatestInsights(insights);
    onMemoryChange();
  }, [onMemoryChange]);

  const handleEventRun = useCallback(({ eventType, outputs, incomingEmail }) => {
    setEventOutputs(prev => ({
      ...prev,
      [eventType]: [...(prev[eventType] || []), ...outputs],
    }));
    if (incomingEmail) setEmailMeta(incomingEmail);
    onMemoryChange();
  }, [onMemoryChange]);

  return (
    <>
      <div className="ws-header">
        <div className="ws-client-label">Client Workspace</div>
        <div className="ws-title">{client.company_name} Engagement</div>
        <div className="ws-subtitle">{client.industry}</div>
        <div className="ws-meta">
          <div className="ws-meta-item">
            <div className="ws-meta-dot" />
            <span>{client.client_name}</span>
          </div>
          {attendeeCount > 0 && (
            <div className="ws-meta-item">
              <div className="ws-meta-dot" />
              <span>{attendeeCount} attendee{attendeeCount !== 1 ? 's' : ''}</span>
            </div>
          )}
          {augusta.length > 0 && (
            <div className="ws-meta-item">
              <div className="ws-meta-dot" />
              <span>Augusta team: {augusta.length}</span>
            </div>
          )}
          {memory && (
            <div className="ws-meta-item">
              <div className="ws-meta-dot" />
              <span className="badge" style={{ fontSize:10 }}>{memory.project_status || 'discovery'}</span>
            </div>
          )}
        </div>
      </div>

      <div className="ws-section">
        <div className="ws-section-title">
          <span>Calls &amp; Transcripts</span>
          <span style={{ fontSize:11, color:'var(--text3)', textTransform:'none', letterSpacing:0, fontWeight:400 }}>
            {client.transcripts.length} call{client.transcripts.length !== 1 ? 's' : ''}
          </span>
        </div>
        {outputsLoading ? (
          <div style={{ display:'flex', alignItems:'center', gap:8, padding:'18px 0', fontSize:12, color:'var(--text3)' }}>
            <span className="spinner-sm" /><span>Loading saved outputs…</span>
          </div>
        ) : client.transcripts.length === 0 ? (
          <div style={{ padding:'18px 0', fontSize:12, color:'var(--text3)' }}>No transcripts available.</div>
        ) : (
          client.transcripts.map((tx, i) => (
            <TranscriptCard
              key={tx.id}
              transcript={tx}
              index={i}
              clientId={client.client_id}
              persistedOutputs={txOutputs[tx.id] || []}
              onRun={handleTranscriptRun}
            />
          ))
        )}
      </div>

      <div className="ws-section" style={{ paddingBottom: 40 }}>
        <div className="ws-section-title"><span>Other Events</span></div>
        <EventCard
          title="Meeting in 3 hours"
          desc={memory
            ? "Generate a pre-meeting briefing based on project memory"
            : "Generate a company research report before the first meeting"}
          clientId={client.client_id}
          eventType="meeting"
          persistedOutputs={eventOutputs['meeting'] || []}
          persistedEmail={null}
          onRun={handleEventRun}
        />
        {client.email && (
          <EventCard
            title="Email reply came in"
            desc={`From ${client.email.from_name} — "${client.email.subject}"`}
            clientId={client.client_id}
            eventType="email"
            persistedOutputs={eventOutputs['email'] || []}
            persistedEmail={emailMeta}
            onRun={handleEventRun}
          />
        )}
      </div>
    </>
  );
}

// ── Main App ──────────────────────────────────────────────────────
function App() {
  const [clients, setClients]   = useState([]);
  const [selected, setSelected] = useState(null);
  const [memory, setMemory]     = useState(null);
  const [showChat, setShowChat] = useState(false);
  const [dark, toggleDark]      = useDarkMode();

  const loadClients = useCallback(async () => {
    try { const data = await apiFetch('/api/clients'); setClients(data); }
    catch (e) { console.error(e); }
  }, []);

  const loadMemory = useCallback(async (clientId) => {
    if (!clientId) { setMemory(null); return; }
    try { const d = await apiFetch(`/api/clients/${clientId}/memory`); setMemory(d.memory || null); }
    catch { setMemory(null); }
  }, []);

  useEffect(() => { loadClients(); }, []);

  const selectClient = async (c) => {
    setSelected(c);
    setShowChat(false);
    await loadMemory(c.client_id);
  };

  const handleMemoryChange = useCallback(async () => {
    if (selected) { await loadMemory(selected.client_id); await loadClients(); }
  }, [selected, loadMemory, loadClients]);

  const resetMemory = async (clientId) => {
    await apiFetch('/api/memory/reset', { method:'POST', body: JSON.stringify({ client_id: clientId || null }) });
    await loadClients();
    if (clientId && selected?.client_id === clientId) setMemory(null);
    else if (!clientId) { setMemory(null); setSelected(null); }
  };

  const freshSelected = selected
    ? (clients.find(c => c.client_id === selected.client_id) || selected)
    : null;

  // Pick logo based on dark mode
  const logoSrc = dark ? LOGO_SRC_LIGHT : LOGO_SRC_DARK;

  return (
    <div className="app">

      {/* ── Top bar ── */}
      <header className="topbar">
        <div className="logo">
          <img src={logoSrc} alt="Augusta logo" className="logo-img" />
        </div>
        <div className="topbar-right">
          {freshSelected && (
            <span style={{ color:'var(--text2)', fontWeight:500 }}>{freshSelected.company_name}</span>
          )}
          <DarkModeToggle dark={dark} onToggle={toggleDark} />
        </div>
      </header>

      <div className="main">

        {/* ── Left sidebar ── */}
        <aside className="sidebar">
          <div className="sidebar-header">Clients</div>
          {clients.map(c => {
            const isSel = selected?.client_id === c.client_id;
            const hasMem = !!c.memory;
            return (
              <div key={c.client_id} className={`client-item ${isSel ? 'active' : ''}`} onClick={() => selectClient(c)}>
                <div className="client-avatar">{c.company_name.charAt(0)}</div>
                <div className="client-info">
                  <div className="client-name">{c.company_name}</div>
                  <div className="client-industry">{c.industry}</div>
                </div>
                {hasMem && <div className="client-mem-dot" title="Has memory" />}
              </div>
            );
          })}
          <div className="sidebar-footer">
            <button
              className="btn btn-outline btn-sm"
              style={{ width:'100%', justifyContent:'center' }}
              onClick={() => resetMemory()}
            >
              Reset all memory
            </button>
          </div>
        </aside>

        {/* ── Center workspace ── */}
        <main className="workspace">
          {!freshSelected ? (
            <div className="empty-state">
              <div className="empty-title">Select a client to get started</div>
              <div className="empty-desc">
                Choose a client from the sidebar to open their engagement workspace,
                run events, and review generated outputs.
              </div>
              <div className="empty-grid">
                {[
                  { t:'Transcripts',  d:'Process meeting recordings to extract insights, generate emails and plans' },
                  { t:'Meeting Prep', d:'Brief the team before an upcoming call, or research a new client' },
                  { t:'Email Reply',  d:'Draft a contextual response to an incoming client email' },
                  { t:'Memory',       d:'Context accumulates across events and evolves with each transcript' },
                ].map(x => (
                  <div key={x.t} className="empty-card">
                    <div className="empty-card-t">{x.t}</div>
                    <div className="empty-card-d">{x.d}</div>
                  </div>
                ))}
              </div>
            </div>
          ) : (
            <Workspace
              key={freshSelected.client_id}
              client={freshSelected}
              memory={memory}
              onMemoryChange={handleMemoryChange}
            />
          )}
        </main>

        {/* ── Right panel ── */}
        <aside className="right-panel">
          <div className="rp-section">
            <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:10 }}>
              <div className="rp-label" style={{ margin:0 }}>Ask the Agent</div>
              {freshSelected && (
                <button className="btn btn-outline btn-sm" onClick={() => setShowChat(v => !v)}>
                  {showChat ? 'Hide' : 'Open chat'}
                </button>
              )}
            </div>
            {showChat && freshSelected ? (
              <ChatPanel clientId={freshSelected.client_id} companyName={freshSelected.company_name} />
            ) : (
              <div
                style={{ border:'1px solid var(--border)', borderRadius:4, padding:'18px 14px', textAlign:'center', cursor: freshSelected ? 'pointer' : 'default' }}
                onClick={() => freshSelected && setShowChat(true)}
              >
                <div style={{ fontSize:13, fontWeight:500, color:'var(--text)', marginBottom:3 }}>Chat Interface</div>
                <div style={{ fontSize:11.5, color:'var(--text3)', lineHeight:1.6 }}>
                  {freshSelected ? 'Ask questions, refine outputs, explore context' : 'Select a client to start chatting'}
                </div>
              </div>
            )}
          </div>

          <div className="rp-section">
            <div className="rp-label">Project Memory</div>
            <MemoryPanel
              memory={memory}
              onReset={freshSelected ? () => resetMemory(freshSelected.client_id) : null}
            />
          </div>

          <div className="rp-section">
            <div className="rp-label">Test Data</div>
            <div style={{ fontSize:11.5, color:'var(--text3)', lineHeight:1.9 }}>
              <div><span style={{ color:'var(--text2)', fontWeight:500 }}>Atlassian</span> — 3 calls, 1 email</div>
              <div><span style={{ color:'var(--text2)', fontWeight:500 }}>Marsh McLennan</span> — 3 calls, 1 email</div>
            </div>
            <div style={{ marginTop:8, fontSize:11, color:'var(--text3)', lineHeight:1.7 }}>
              Suggested flow: run all 3 transcripts in order, then trigger the email event to see memory evolve.
            </div>
          </div>
        </aside>

      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
