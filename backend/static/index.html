<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Augusta PM Agent</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/marked@9/marked.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #ffffff;
    --bg2:      #f7f7f7;
    --bg3:      #f0f0f0;
    --border:   #e5e5e5;
    --border2:  #d4d4d4;
    --text:     #111111;
    --text2:    #666666;
    --text3:    #999999;
    --accent:   #111111;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    font-size: 13px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text3); }

  /* ── Markdown ── */
  .md h1 { font-size: 1.15em; color: var(--text); margin: 1.2em 0 0.5em; font-weight: 700; }
  .md h2 { font-size: 1em; color: var(--text); margin: 1em 0 0.4em; font-weight: 600; padding-bottom: 0.3em; border-bottom: 1px solid var(--border); }
  .md h3 { font-size: 0.9em; color: var(--text); margin: 0.8em 0 0.3em; font-weight: 600; }
  .md p { margin: 0.55em 0; color: var(--text2); }
  .md ul, .md ol { margin: 0.4em 0; padding-left: 1.4em; }
  .md li { margin: 0.25em 0; color: var(--text2); }
  .md strong { color: var(--text); font-weight: 600; }
  .md em { color: var(--text3); font-style: italic; }
  .md code { background: var(--bg2); color: var(--text); padding: 0.1em 0.35em; border-radius: 3px; font-size: 0.85em; font-family: 'SF Mono', 'Fira Code', monospace; border: 1px solid var(--border); }
  .md pre { background: var(--bg2); border: 1px solid var(--border); border-radius: 4px; padding: 1em; overflow-x: auto; margin: 0.6em 0; }
  .md pre code { background: none; border: none; padding: 0; }
  .md blockquote { border-left: 2px solid var(--border2); padding-left: 1em; margin: 0.6em 0; color: var(--text3); }
  .md table { width: 100%; border-collapse: collapse; margin: 0.8em 0; font-size: 0.9em; }
  .md th { background: var(--bg2); padding: 0.45em 0.7em; text-align: left; border-bottom: 1px solid var(--border); color: var(--text); font-weight: 600; }
  .md td { padding: 0.45em 0.7em; border-bottom: 1px solid var(--border); color: var(--text2); }
  .md tr:hover td { background: var(--bg2); }
  .md a { color: var(--text); text-decoration: underline; text-underline-offset: 2px; }
  .md hr { border: none; border-top: 1px solid var(--border); margin: 1em 0; }

  /* ── Animations ── */
  @keyframes fadeIn  { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes spin    { to { transform: rotate(360deg); } }
  @keyframes pulse   { 0%, 100% { opacity: 1; } 50% { opacity: 0.35; } }
  .fade-in { animation: fadeIn 0.2s ease-out; }
  .spin    { animation: spin 0.8s linear infinite; }
  .pulse   { animation: pulse 1.6s ease-in-out infinite; }

  /* ── Layout ── */
  .app { display: flex; flex-direction: column; min-height: 100vh; }

  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 20px; height: 48px;
    background: var(--bg); border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 100;
  }

  .logo { display: flex; align-items: center; gap: 8px; }
  .logo-mark {
    width: 26px; height: 26px; border-radius: 5px;
    background: var(--text); display: flex; align-items: center;
    justify-content: center; font-size: 13px; color: #fff; font-weight: 700;
    letter-spacing: -0.5px;
  }
  .logo-text  { font-weight: 600; font-size: 14px; color: var(--text); letter-spacing: -0.3px; }
  .logo-slash { color: var(--border2); font-weight: 300; font-size: 16px; margin: 0 2px; }
  .logo-sub   { font-size: 13px; color: var(--text3); }

  .main    { display: flex; flex: 1; }
  .sidebar { width: 260px; min-width: 260px; border-right: 1px solid var(--border); background: var(--bg); overflow-y: auto; display: flex; flex-direction: column; }
  .content { flex: 1; overflow-y: auto; padding: 28px 32px; background: var(--bg); }
  .right-panel { width: 320px; min-width: 320px; border-left: 1px solid var(--border); background: var(--bg); overflow-y: auto; display: flex; flex-direction: column; }

  /* ── Sidebar sections ── */
  .sidebar-section { padding: 16px; border-bottom: 1px solid var(--border); }
  .sidebar-label {
    font-size: 10px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.08em; color: var(--text3); margin-bottom: 8px;
  }

  /* ── Client list ── */
  .client-item {
    display: flex; align-items: center; gap: 9px;
    padding: 8px 10px; border-radius: 4px; cursor: pointer;
    transition: background 0.1s; margin-bottom: 1px;
    border-left: 2px solid transparent;
  }
  .client-item:hover { background: var(--bg2); }
  .client-item.selected { background: var(--bg2); border-left-color: var(--text); }

  .client-initial {
    width: 28px; height: 28px; border-radius: 4px; flex-shrink: 0;
    background: var(--bg3); display: flex; align-items: center;
    justify-content: center; font-size: 12px; font-weight: 600; color: var(--text2);
  }
  .client-item.selected .client-initial { background: var(--text); color: #fff; }

  .client-name { font-size: 13px; font-weight: 500; color: var(--text); line-height: 1.3; }
  .client-sub  { font-size: 11px; color: var(--text3); }

  .client-mem-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--text3); flex-shrink: 0; margin-left: auto;
  }
  .client-mem-dot.active { background: #111; }

  /* ── Transcript list (inside expanded client) ── */
  .transcript-block { padding: 4px 10px 10px 10px; }
  .transcript-block-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text3); margin-bottom: 5px; padding-left: 2px; }
  .transcript-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 5px 8px; border-radius: 3px; cursor: pointer;
    transition: background 0.1s; font-size: 11.5px; color: var(--text2);
    border-left: 2px solid transparent;
  }
  .transcript-row:hover { background: var(--bg3); color: var(--text); }
  .transcript-row.selected { border-left-color: var(--text); background: var(--bg3); color: var(--text); font-weight: 500; }
  .transcript-date { font-size: 10px; color: var(--text3); flex-shrink: 0; margin-left: 8px; }

  /* ── Buttons (general) ── */
  button { cursor: pointer; border: none; outline: none; font-family: inherit; background: none; }

  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 5px;
    font-size: 12px; font-weight: 500; padding: 6px 12px;
    border-radius: 4px; transition: background 0.1s, color 0.1s;
  }
  .btn-outline {
    border: 1px solid var(--border); color: var(--text2); background: var(--bg);
  }
  .btn-outline:hover { background: var(--bg2); color: var(--text); }

  .btn-solid {
    background: var(--text); color: #fff; border: 1px solid var(--text);
  }
  .btn-solid:hover { background: #333; }

  .btn-ghost { color: var(--text2); }
  .btn-ghost:hover { color: var(--text); background: var(--bg2); }

  .btn-danger {
    color: #999; font-size: 11px; padding: 4px 8px;
    border-radius: 3px; border: 1px solid var(--border);
  }
  .btn-danger:hover { color: #c00; background: #fff0f0; border-color: #f5c6c6; }

  .btn-sm { padding: 4px 9px; font-size: 11px; }

  /* ── Event trigger buttons ── */
  .event-btn-row { display: flex; flex-direction: column; gap: 5px; }
  .event-btn {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 12px; border-radius: 4px; width: 100%;
    border: 1px solid var(--border); background: var(--bg);
    color: var(--text); font-size: 12px; font-weight: 500;
    transition: background 0.1s, border-color 0.1s; text-align: left;
  }
  .event-btn:hover:not(:disabled) { background: var(--bg2); border-color: var(--border2); }
  .event-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .event-btn.is-loading { background: var(--bg2); border-color: var(--border2); }
  .event-btn-icon { font-size: 14px; flex-shrink: 0; }
  .event-btn-text { flex: 1; }
  .event-btn-label { font-weight: 500; font-size: 12px; color: var(--text); }
  .event-btn-sub   { font-size: 10px; color: var(--text3); margin-top: 0; }

  /* ── Output panels ── */
  .output-panel { border: 1px solid var(--border); border-radius: 4px; overflow: hidden; margin-bottom: 10px; background: var(--bg); }
  .output-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px; cursor: pointer; background: var(--bg);
    border-bottom: 1px solid transparent; transition: background 0.1s;
    user-select: none;
  }
  .output-header:hover { background: var(--bg2); }
  .output-header.open  { border-bottom-color: var(--border); }
  .output-header-left  { display: flex; align-items: center; gap: 8px; }
  .output-type-tag {
    font-size: 10px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.07em; color: var(--text3);
    padding: 2px 6px; border: 1px solid var(--border); border-radius: 3px;
  }
  .output-title { font-size: 13px; font-weight: 500; color: var(--text); }
  .output-body  { padding: 18px 20px; overflow-y: auto; max-height: 560px; }
  .output-chevron { font-size: 10px; color: var(--text3); flex-shrink: 0; }

  /* ── Status badge ── */
  .status-badge {
    display: inline-flex; align-items: center; font-size: 10px; font-weight: 500;
    padding: 2px 7px; border-radius: 3px; text-transform: capitalize;
    background: var(--bg2); color: var(--text2); border: 1px solid var(--border);
  }

  /* ── Memory panel ── */
  .memory-block { border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }
  .memory-block-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 9px 12px; cursor: pointer; background: var(--bg);
    transition: background 0.1s;
  }
  .memory-block-header:hover { background: var(--bg2); }
  .memory-block-title { font-size: 12px; font-weight: 500; color: var(--text); }
  .memory-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; border-bottom: 1px solid var(--border); }
  .memory-stat { padding: 8px 6px; text-align: center; border-right: 1px solid var(--border); }
  .memory-stat:last-child { border-right: none; }
  .memory-stat-val   { font-size: 15px; font-weight: 700; color: var(--text); }
  .memory-stat-label { font-size: 10px; color: var(--text3); margin-top: 1px; }
  .memory-body { padding: 12px; }

  /* ── Loading ── */
  .loading-state {
    padding: 48px 24px; display: flex; flex-direction: column;
    align-items: center; gap: 14px; text-align: center;
  }
  .spinner {
    width: 24px; height: 24px; border-radius: 50%;
    border: 2px solid var(--border);
    border-top-color: var(--text);
    animation: spin 0.8s linear infinite;
  }

  /* ── Empty state ── */
  .empty-state { padding: 64px 24px; text-align: center; }
  .empty-state-title { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
  .empty-state-desc  { font-size: 13px; color: var(--text3); max-width: 380px; margin: 0 auto; line-height: 1.7; }

  /* ── How-to grid ── */
  .how-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; max-width: 420px; margin: 24px auto 0; }
  .how-card {
    border: 1px solid var(--border); border-radius: 4px;
    padding: 14px; text-align: left; background: var(--bg);
  }
  .how-card-title { font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
  .how-card-desc  { font-size: 11px; color: var(--text3); line-height: 1.55; }

  /* ── Chat ── */
  .chat-area {
    display: flex; flex-direction: column; height: 460px;
    border: 1px solid var(--border); border-radius: 4px; overflow: hidden;
  }
  .chat-title-bar {
    padding: 9px 12px; border-bottom: 1px solid var(--border);
    font-size: 11px; font-weight: 600; color: var(--text2);
    background: var(--bg2); text-transform: uppercase; letter-spacing: 0.07em;
  }
  .chat-messages {
    flex: 1; overflow-y: auto; padding: 12px;
    display: flex; flex-direction: column; gap: 8px;
  }
  .chat-empty {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; height: 100%; gap: 14px; text-align: center;
  }
  .chat-suggestions { display: flex; flex-direction: column; gap: 4px; width: 100%; }
  .chat-suggestion {
    text-align: left; font-size: 11.5px; padding: 7px 10px; border-radius: 3px;
    border: 1px solid var(--border); color: var(--text2); cursor: pointer;
    transition: background 0.1s, color 0.1s; background: var(--bg);
  }
  .chat-suggestion:hover { background: var(--bg2); color: var(--text); }

  .msg { display: flex; gap: 8px; }
  .msg.user { flex-direction: row-reverse; }
  .msg-bubble {
    max-width: 84%; padding: 8px 11px; font-size: 12.5px; line-height: 1.55;
    border-radius: 4px;
  }
  .msg.user      .msg-bubble { background: var(--text);  color: #fff; }
  .msg.assistant .msg-bubble { background: var(--bg2);   color: var(--text); border: 1px solid var(--border); }

  .chat-input-wrap { padding: 8px; border-top: 1px solid var(--border); display: flex; gap: 6px; align-items: flex-end; background: var(--bg); }
  .chat-input {
    flex: 1; resize: none; border-radius: 3px; padding: 7px 10px;
    background: var(--bg2); border: 1px solid var(--border);
    color: var(--text); font-size: 12.5px; font-family: inherit;
    outline: none; max-height: 80px; min-height: 34px;
    transition: border-color 0.1s;
  }
  .chat-input:focus { border-color: var(--border2); }
  .chat-input::placeholder { color: var(--text3); }
  .chat-send {
    width: 32px; height: 32px; border-radius: 3px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    background: var(--text); color: #fff; font-size: 13px;
    transition: background 0.1s;
  }
  .chat-send:hover:not(:disabled) { background: #333; }
  .chat-send:disabled { background: var(--bg3); color: var(--text3); cursor: not-allowed; }

  /* ── Insights ── */
  .insight-group { padding: 10px 0; border-bottom: 1px solid var(--border); }
  .insight-group:last-child { border-bottom: none; }
  .insight-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text3); margin-bottom: 6px; }
  .insight-row { display: flex; align-items: flex-start; gap: 7px; margin-bottom: 5px; font-size: 12px; color: var(--text2); }
  .insight-mark { flex-shrink: 0; color: var(--text3); font-size: 11px; margin-top: 1px; }

  /* ── Error ── */
  .error-bar {
    display: flex; align-items: flex-start; gap: 10px; padding: 10px 14px;
    background: #fff5f5; border: 1px solid #fecaca; border-radius: 4px;
    margin-bottom: 14px;
  }
  .error-title { font-size: 12px; font-weight: 600; color: #c00; }
  .error-msg   { font-size: 11.5px; color: var(--text2); margin-top: 2px; }
  .error-close { margin-left: auto; color: var(--text3); cursor: pointer; font-size: 16px; padding: 0; flex-shrink: 0; line-height: 1; }

  /* ── Context banners ── */
  .context-banner {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 12px; background: var(--bg2); border: 1px solid var(--border);
    border-radius: 4px; margin-bottom: 12px; font-size: 12px; color: var(--text2);
  }
  .context-banner strong { color: var(--text); font-weight: 500; }

  /* ── Email preview ── */
  .email-preview {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 4px; padding: 12px 14px; margin-bottom: 12px;
  }
  .email-preview-label {
    font-size: 10px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.07em; color: var(--text3); margin-bottom: 6px;
  }
  .email-preview-subject { font-size: 13px; font-weight: 500; color: var(--text); }
  .email-preview-from    { font-size: 11.5px; color: var(--text3); margin-top: 2px; }
  .email-preview-body    { font-size: 12px; color: var(--text2); margin-top: 7px; line-height: 1.6; }

  /* ── Activity log ── */
  .activity-row {
    display: flex; align-items: center; gap: 9px;
    padding: 7px 0; border-bottom: 1px solid var(--border);
    font-size: 11.5px;
  }
  .activity-row:last-child { border-bottom: none; }
  .activity-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--border2); flex-shrink: 0; }

  /* ── Steps ── */
  .steps { display: flex; flex-direction: column; gap: 10px; }
  .step  { display: flex; gap: 10px; align-items: flex-start; }
  .step-num {
    width: 20px; height: 20px; border-radius: 50%; flex-shrink: 0;
    border: 1px solid var(--border); background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 600; color: var(--text3);
  }
  .step-title { font-size: 12px; font-weight: 500; color: var(--text); }
  .step-desc  { font-size: 11px; color: var(--text3); margin-top: 1px; line-height: 1.5; }

  /* ── Copy btn ── */
  .copy-btn {
    display: inline-flex; align-items: center; gap: 4px; font-size: 11px;
    padding: 3px 7px; border-radius: 3px; border: 1px solid var(--border);
    color: var(--text3); cursor: pointer; transition: all 0.1s; background: var(--bg);
  }
  .copy-btn:hover { border-color: var(--border2); color: var(--text); background: var(--bg2); }

  /* ── Output History ── */
  .history-list { display: flex; flex-direction: column; }
  .history-row {
    display: flex; align-items: center; gap: 9px;
    padding: 7px 8px; border-radius: 3px; cursor: pointer;
    transition: background 0.1s; border-left: 2px solid transparent;
  }
  .history-row:hover { background: var(--bg2); }
  .history-row.active { background: var(--bg2); border-left-color: var(--text); }
  .history-row-type {
    font-size: 9px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.06em; color: var(--text3);
    border: 1px solid var(--border); border-radius: 2px;
    padding: 1px 5px; flex-shrink: 0; white-space: nowrap;
  }
  .history-row-title {
    font-size: 12px; color: var(--text); flex: 1;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .history-row-date { font-size: 10px; color: var(--text3); flex-shrink: 0; }
  .history-filter-row {
    display: flex; gap: 4px; margin-bottom: 8px; flex-wrap: wrap;
  }
  .filter-btn {
    font-size: 10px; padding: 3px 8px; border-radius: 3px;
    border: 1px solid var(--border); color: var(--text3);
    cursor: pointer; transition: all 0.1s; background: var(--bg);
  }
  .filter-btn:hover  { background: var(--bg2); color: var(--text); }
  .filter-btn.active { background: var(--text); color: #fff; border-color: var(--text); }

  /* ── Misc ── */
  .divider { height: 1px; background: var(--border); margin: 12px 0; }
  .topbar-client {
    display: flex; align-items: center; gap: 6px; font-size: 12px;
    color: var(--text2); font-weight: 500;
  }
  .topbar-client-dot {
    width: 20px; height: 20px; border-radius: 3px; background: var(--bg2);
    border: 1px solid var(--border); display: flex; align-items: center;
    justify-content: center; font-size: 11px; font-weight: 600; color: var(--text);
  }
  .page-title { font-size: 17px; font-weight: 600; color: var(--text); letter-spacing: -0.3px; line-height: 1.3; }
  .page-sub   { font-size: 12px; color: var(--text3); margin-top: 3px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;
const API = '';

// ─── API helpers ─────────────────────────────────────────────
async function apiFetch(path, opts = {}) {
  const res = await fetch(API + path, {
    headers: { 'Content-Type': 'application/json' },
    ...opts,
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({ detail: res.statusText }));
    throw new Error(err.detail || 'Request failed');
  }
  return res.json();
}

// ─── Markdown renderer ───────────────────────────────────────
function Markdown({ content }) {
  const html = marked.parse(content || '', { breaks: true });
  return <div className="md" dangerouslySetInnerHTML={{ __html: html }} />;
}

// ─── Copy button ─────────────────────────────────────────────
function CopyBtn({ text }) {
  const [copied, setCopied] = useState(false);
  const copy = (e) => {
    e.stopPropagation();
    navigator.clipboard.writeText(text);
    setCopied(true);
    setTimeout(() => setCopied(false), 2000);
  };
  return (
    <button className="copy-btn" onClick={copy}>
      {copied ? '✓ Copied' : 'Copy'}
    </button>
  );
}

// ─── Output Panel ────────────────────────────────────────────
const OUTPUT_CONFIG = {
  email:           { tag: 'Email',           label: 'Follow-up Email'      },
  proposal:        { tag: 'Proposal',        label: 'Proposal Document'    },
  team_plan:       { tag: 'Team Plan',       label: 'Internal Team Plan'   },
  meeting_prep:    { tag: 'Meeting Prep',    label: 'Pre-Meeting Briefing' },
  research_report: { tag: 'Research',        label: 'Research Report'      },
  email_reply:     { tag: 'Email Reply',     label: 'Email Response Draft' },
};

function OutputPanel({ output, defaultOpen = true }) {
  const [open, setOpen] = useState(defaultOpen);
  const cfg = OUTPUT_CONFIG[output.type] || OUTPUT_CONFIG.email;
  return (
    <div className="output-panel fade-in">
      <div className={`output-header ${open ? 'open' : ''}`} onClick={() => setOpen(!open)}>
        <div className="output-header-left">
          <span className="output-type-tag">{cfg.tag}</span>
          <span className="output-title">{output.title || cfg.label}</span>
        </div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
          {open && <CopyBtn text={output.content} />}
          <span className="output-chevron">{open ? '▲' : '▼'}</span>
        </div>
      </div>
      {open && (
        <div className="output-body">
          <Markdown content={output.content} />
        </div>
      )}
    </div>
  );
}

// ─── Memory Panel ─────────────────────────────────────────────
function MemoryPanel({ memory }) {
  const [open, setOpen] = useState(false);
  if (!memory) {
    return (
      <div style={{ padding: '10px 12px', border: '1px solid var(--border)', borderRadius: 4, color: 'var(--text3)', fontSize: 12 }}>
        No memory yet — trigger an event to build context.
      </div>
    );
  }
  const openItems = (memory.open_items || []).filter(i => !i.resolved);
  return (
    <div className="memory-block">
      <div className="memory-block-header" onClick={() => setOpen(!open)}>
        <span className="memory-block-title">Project Memory</span>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
          <span className="status-badge">{memory.project_status}</span>
          <span style={{ fontSize: 10, color: 'var(--text3)' }}>{open ? '▲' : '▼'}</span>
        </div>
      </div>
      <div className="memory-stats">
        {[
          { label: 'Events',     val: (memory.events || []).length },
          { label: 'Open Items', val: openItems.length },
          { label: 'Decisions',  val: (memory.decisions || []).length },
        ].map(s => (
          <div className="memory-stat" key={s.label}>
            <div className="memory-stat-val">{s.val}</div>
            <div className="memory-stat-label">{s.label}</div>
          </div>
        ))}
      </div>
      {open && (
        <div className="memory-body fade-in">
          {(memory.events || []).length > 0 && (
            <div style={{ marginBottom: 10 }}>
              <div className="insight-label">Recent Events</div>
              {[...(memory.events || [])].reverse().slice(0, 5).map((e, i) => (
                <div key={i} className="insight-row">
                  <span className="status-badge" style={{ fontSize: 9 }}>{e.type}</span>
                  <span style={{ flex: 1 }}>{e.summary}</span>
                  <span style={{ color: 'var(--text3)', fontSize: 10, flexShrink: 0 }}>{(e.timestamp || '').slice(0, 10)}</span>
                </div>
              ))}
            </div>
          )}
          {openItems.length > 0 && (
            <div style={{ marginBottom: 10 }}>
              <div className="insight-label">Open Items</div>
              {openItems.slice(0, 8).map((item, i) => (
                <div key={i} className="insight-row">
                  <span className="insight-mark">–</span>
                  <span>{item.item}</span>
                </div>
              ))}
            </div>
          )}
          {memory.extra_context && (
            <div>
              <div className="insight-label">Latest Context</div>
              <p style={{ fontSize: 11.5, color: 'var(--text2)', lineHeight: 1.6 }}>{memory.extra_context}</p>
            </div>
          )}
          <div style={{ marginTop: 10, fontSize: 10, color: 'var(--text3)' }}>
            Updated {(memory.last_updated || '').slice(0, 16).replace('T', ' ')} UTC
          </div>
        </div>
      )}
    </div>
  );
}

// ─── Chat Panel ───────────────────────────────────────────────
function ChatPanel({ clientId, companyName }) {
  const [msgs, setMsgs] = useState([]);
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const bottomRef = useRef(null);
  const inputRef = useRef(null);

  useEffect(() => { bottomRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [msgs]);

  const send = async (text) => {
    const t = (text || input).trim();
    if (!t || loading) return;
    const newMsgs = [...msgs, { role: 'user', content: t }];
    setMsgs(newMsgs);
    setInput('');
    setLoading(true);
    try {
      const data = await apiFetch('/api/chat', {
        method: 'POST',
        body: JSON.stringify({ client_id: clientId, messages: newMsgs }),
      });
      setMsgs([...newMsgs, { role: 'assistant', content: data.response }]);
    } catch (e) {
      setMsgs([...newMsgs, { role: 'assistant', content: `Error: ${e.message}` }]);
    } finally {
      setLoading(false);
    }
  };

  const SUGGESTIONS = [
    'What are the open action items?',
    'What risks should I watch?',
    'Summarize project status',
    'What to prep for next meeting?',
  ];

  return (
    <div className="chat-area">
      <div className="chat-title-bar">Chat — {companyName}</div>
      <div className="chat-messages">
        {msgs.length === 0 ? (
          <div className="chat-empty">
            <div>
              <div style={{ fontSize: 13, fontWeight: 600, color: 'var(--text)', marginBottom: 2 }}>Ask about {companyName}</div>
              <div style={{ fontSize: 11.5, color: 'var(--text3)' }}>I have full project context</div>
            </div>
            <div className="chat-suggestions">
              {SUGGESTIONS.map(q => (
                <button key={q} className="chat-suggestion" onClick={() => send(q)}>{q}</button>
              ))}
            </div>
          </div>
        ) : (
          msgs.map((m, i) => (
            <div key={i} className={`msg ${m.role}`}>
              <div className="msg-bubble">
                {m.role === 'assistant' ? <Markdown content={m.content} /> : m.content}
              </div>
            </div>
          ))
        )}
        {loading && (
          <div className="msg assistant">
            <div className="msg-bubble">
              <span className="spin" style={{ display: 'inline-block', width: 14, height: 14, border: '2px solid var(--border)', borderTopColor: 'var(--text)', borderRadius: '50%' }}></span>
            </div>
          </div>
        )}
        <div ref={bottomRef} />
      </div>
      <div className="chat-input-wrap">
        <textarea
          ref={inputRef}
          className="chat-input"
          placeholder="Ask about this engagement… (Enter to send)"
          value={input}
          onChange={e => setInput(e.target.value)}
          onKeyDown={e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } }}
          rows={1}
          onInput={e => { e.target.style.height = 'auto'; e.target.style.height = Math.min(e.target.scrollHeight, 80) + 'px'; }}
        />
        <button className="chat-send" disabled={!input.trim() || loading} onClick={() => send()}>↑</button>
      </div>
    </div>
  );
}

// ─── Output History Panel ───────────────────────────────────────
const OUTPUT_TYPE_LABELS = {
  email:           'Email',
  proposal:        'Proposal',
  team_plan:       'Team Plan',
  meeting_prep:    'Meeting Prep',
  research_report: 'Research',
  email_reply:     'Email Reply',
};

const FILTERS = [
  { key: 'all',      label: 'All' },
  { key: 'email',    label: 'Emails' },
  { key: 'proposal', label: 'Proposals' },
  { key: 'team_plan', label: 'Plans' },
];

function formatDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
}

function HistoryPanel({ clientId, onOpen, activeId }) {
  const [outputs, setOutputs] = useState([]);
  const [filter, setFilter]   = useState('all');
  const [loading, setLoading] = useState(false);

  const load = useCallback(async () => {
    if (!clientId) { setOutputs([]); return; }
    setLoading(true);
    try {
      const d = await apiFetch(`/api/clients/${clientId}/outputs`);
      setOutputs(d.outputs || []);
    } catch { setOutputs([]); }
    finally { setLoading(false); }
  }, [clientId]);

  useEffect(() => { load(); }, [load]);

  // Expose reload so parent can call it after a new event
  HistoryPanel._reload = load;

  const visible = filter === 'all'
    ? outputs
    : outputs.filter(o => {
        if (filter === 'email') return o.type === 'email' || o.type === 'email_reply';
        return o.type === filter;
      });

  if (!clientId) return (
    <div style={{ padding: '10px 12px', border: '1px solid var(--border)', borderRadius: 4, color: 'var(--text3)', fontSize: 12 }}>
      Select a client to see their output history.
    </div>
  );

  return (
    <div>
      <div className="history-filter-row">
        {FILTERS.map(f => (
          <button
            key={f.key}
            className={`filter-btn ${filter === f.key ? 'active' : ''}`}
            onClick={() => setFilter(f.key)}
          >{f.label}</button>
        ))}
      </div>
      {loading && (
        <div style={{ fontSize: 11.5, color: 'var(--text3)', padding: '8px 0' }}>Loading…</div>
      )}
      {!loading && visible.length === 0 && (
        <div style={{ fontSize: 11.5, color: 'var(--text3)', padding: '4px 0' }}>
          {outputs.length === 0 ? 'No outputs yet — trigger an event to generate.' : 'No outputs match this filter.'}
        </div>
      )}
      <div className="history-list">
        {visible.map(o => (
          <div
            key={o.id}
            className={`history-row ${activeId === o.id ? 'active' : ''}`}
            onClick={() => onOpen(o)}
          >
            <span className="history-row-type">{OUTPUT_TYPE_LABELS[o.type] || o.type}</span>
            <span className="history-row-title">{o.title.replace(/^[^a-zA-Z]+/, '')}</span>
            <span className="history-row-date">{formatDate(o.created_at)}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── Spinner inline ───────────────────────────────────────────
function InlineSpinner() {
  return (
    <span className="spin" style={{
      display: 'inline-block', width: 13, height: 13, borderRadius: '50%',
      border: '1.5px solid var(--border)', borderTopColor: 'var(--text)',
    }}></span>
  );
}

// ─── Main App ─────────────────────────────────────────────────
function App() {
  const [clients, setClients] = useState([]);
  const [selected, setSelected] = useState(null);
  const [selectedTxId, setSelectedTxId] = useState(null);
  const [loading, setLoading] = useState(false);
  const [activeEvent, setActiveEvent] = useState(null);
  const [result, setResult] = useState(null);
  const [error, setError] = useState(null);
  const [memory, setMemory] = useState(null);
  const [history, setHistory] = useState([]);
  const [showChat, setShowChat] = useState(false);
  const [historyOutput, setHistoryOutput] = useState(null); // output opened from history
  const historyPanelRef = useRef(null);

  const loadClients = useCallback(async () => {
    try {
      const data = await apiFetch('/api/clients');
      setClients(data);
    } catch (e) { console.error(e); }
  }, []);

  const loadMemory = useCallback(async () => {
    if (!selected) return setMemory(null);
    try {
      const d = await apiFetch(`/api/clients/${selected.client_id}/memory`);
      setMemory(d.memory || null);
    } catch { setMemory(null); }
  }, [selected]);

  useEffect(() => { loadClients(); }, []);
  useEffect(() => { loadMemory(); }, [selected]);

  const selectClient = async (c) => {
    setSelected(c);
    setSelectedTxId(c.transcripts[0]?.id || null);
    setResult(null);
    setError(null);
    setShowChat(false);
    setHistoryOutput(null);
    try {
      const d = await apiFetch(`/api/clients/${c.client_id}/memory`);
      setMemory(d.memory || null);
    } catch { setMemory(null); }
  };

  const trigger = async (type) => {
    if (!selected || loading) return;
    setLoading(true);
    setActiveEvent(type);
    setError(null);
    setResult(null);
    try {
      let res;
      if (type === 'transcript') {
        res = await apiFetch('/api/events/transcript', {
          method: 'POST',
          body: JSON.stringify({ client_id: selected.client_id, transcript_id: selectedTxId }),
        });
      } else if (type === 'email') {
        res = await apiFetch('/api/events/email', {
          method: 'POST',
          body: JSON.stringify({ client_id: selected.client_id }),
        });
      } else {
        res = await apiFetch('/api/events/meeting', {
          method: 'POST',
          body: JSON.stringify({ client_id: selected.client_id }),
        });
      }
      setResult(res);
      setHistory(h => [{ id: Date.now(), type, client: selected.company_name, time: new Date().toLocaleTimeString(), outputs: Object.keys(res.outputs || {}).length }, ...h].slice(0, 8));
      await loadMemory();
      await loadClients();
      // Reload history panel after new output is saved
      if (HistoryPanel._reload) await HistoryPanel._reload();
    } catch (e) {
      setError(e.message);
    } finally {
      setLoading(false);
      setActiveEvent(null);
    }
  };

  const resetMem = async (clientId) => {
    await apiFetch('/api/memory/reset', {
      method: 'POST',
      body: JSON.stringify({ client_id: clientId || null }),
    });
    await loadClients();
    await loadMemory();
    setResult(null);
    setHistoryOutput(null);
    if (HistoryPanel._reload) await HistoryPanel._reload();
  };

  const outputs = result ? Object.values(result.outputs || {}) : [];
  const EVENT_LABELS = { transcript: 'Transcript', email: 'Email Reply', meeting: 'Meeting Prep' };
  const freshSelected = selected ? (clients.find(c => c.client_id === selected.client_id) || selected) : null;

  // The active output ID for the history panel selection indicator
  const activeHistoryId = historyOutput?.id || null;

  const openHistoryOutput = (o) => {
    setHistoryOutput(o);
    setResult(null);    // clear current event result
    setError(null);
  };

  return (
    <div className="app">
      {/* ── Top Bar ── */}
      <header className="topbar">
        <div className="logo">
          <div className="logo-mark">A</div>
          <span className="logo-text">Augusta</span>
          <span className="logo-slash">/</span>
          <span className="logo-sub">PM Agent</span>
        </div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 16 }}>
          {loading && (
            <div style={{ display: 'flex', alignItems: 'center', gap: 7, fontSize: 12, color: 'var(--text3)' }}>
              <InlineSpinner />
              Agent working…
            </div>
          )}
          {history.length > 0 && !loading && (
            <div style={{ fontSize: 11, color: 'var(--text3)' }}>
              {history.length} event{history.length !== 1 ? 's' : ''} this session
            </div>
          )}
          {freshSelected && (
            <div className="topbar-client">
              <div className="topbar-client-dot">{freshSelected.company_name.charAt(0)}</div>
              {freshSelected.company_name}
            </div>
          )}
        </div>
      </header>

      {/* ── Main ── */}
      <div className="main">

        {/* ── LEFT SIDEBAR ── */}
        <aside className="sidebar">

          {/* Clients */}
          <div className="sidebar-section">
            <div className="sidebar-label">Clients</div>
            {clients.map(c => {
              const isSel = selected?.client_id === c.client_id;
              const hasMem = !!c.memory;
              return (
                <div key={c.client_id}>
                  <div className={`client-item ${isSel ? 'selected' : ''}`} onClick={() => selectClient(c)}>
                    <div className={`client-initial`}>{c.company_name.charAt(0)}</div>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div className="client-name">{c.company_name}</div>
                      <div className="client-sub">{c.industry}</div>
                    </div>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 5, flexShrink: 0 }}>
                      {hasMem && <div className={`client-mem-dot active`} title="Has memory"></div>}
                      <button
                        className="btn-danger"
                        onClick={e => { e.stopPropagation(); resetMem(c.client_id); }}
                        title="Clear memory"
                        style={{ fontSize: 10, padding: '2px 6px' }}
                      >Reset</button>
                    </div>
                  </div>
                  {isSel && c.transcripts.length > 0 && (
                    <div className="transcript-block">
                      <div className="transcript-block-label">Transcripts</div>
                      {c.transcripts.map(t => (
                        <div
                          key={t.id}
                          className={`transcript-row ${selectedTxId === t.id ? 'selected' : ''}`}
                          onClick={e => { e.stopPropagation(); setSelectedTxId(t.id); }}
                        >
                          <span style={{ overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', flex: 1 }}>{t.title}</span>
                          <span className="transcript-date">{t.date}</span>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              );
            })}
          </div>

          {/* Trigger Events */}
          <div className="sidebar-section">
            <div className="sidebar-label">Trigger Event</div>
            <div className="event-btn-row">
              <button
                className={`event-btn ${activeEvent === 'transcript' ? 'is-loading' : ''}`}
                disabled={!selected || !freshSelected?.transcripts?.length || loading}
                onClick={() => trigger('transcript')}
              >
                <span className="event-btn-icon">{loading && activeEvent === 'transcript' ? <InlineSpinner /> : '↗'}</span>
                <span className="event-btn-text">
                  <div className="event-btn-label">Meeting transcript came in</div>
                </span>
              </button>
              <button
                className={`event-btn ${activeEvent === 'email' ? 'is-loading' : ''}`}
                disabled={!selected || !freshSelected?.email || loading}
                onClick={() => trigger('email')}
              >
                <span className="event-btn-icon">{loading && activeEvent === 'email' ? <InlineSpinner /> : '↩'}</span>
                <span className="event-btn-text">
                  <div className="event-btn-label">Email reply came in</div>
                </span>
              </button>
              <button
                className={`event-btn ${activeEvent === 'meeting' ? 'is-loading' : ''}`}
                disabled={!selected || loading}
                onClick={() => trigger('meeting')}
              >
                <span className="event-btn-icon">{loading && activeEvent === 'meeting' ? <InlineSpinner /> : '◷'}</span>
                <span className="event-btn-text">
                  <div className="event-btn-label">Meeting in 3 hours</div>
                </span>
              </button>
            </div>
          </div>

          {/* Memory */}
          <div className="sidebar-section">
            <div className="sidebar-label">Project Memory</div>
            <MemoryPanel memory={memory} />
          </div>

          {/* Activity */}
          {history.length > 0 && (
            <div className="sidebar-section">
              <div className="sidebar-label">Activity</div>
              {history.slice(0, 5).map(h => (
                <div key={h.id} className="activity-row">
                  <div className="activity-dot"></div>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontWeight: 500, color: 'var(--text)', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                      {EVENT_LABELS[h.type]} · {h.client}
                    </div>
                    <div style={{ fontSize: 10, color: 'var(--text3)', marginTop: 1 }}>{h.outputs} output{h.outputs !== 1 ? 's' : ''} · {h.time}</div>
                  </div>
                </div>
              ))}
            </div>
          )}

          {/* Reset All */}
          <div className="sidebar-section" style={{ marginTop: 'auto' }}>
            <button
              className="btn btn-outline"
              style={{ width: '100%', justifyContent: 'center', fontSize: 11 }}
              onClick={() => resetMem()}
            >
              Reset all memory
            </button>
          </div>
        </aside>

        {/* ── CENTER CONTENT ── */}
        <main className="content">

          {/* Page header */}
          <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', marginBottom: 24 }}>
            <div>
              <h1 className="page-title">
                {result
                  ? `${EVENT_LABELS[result.event_type] || result.event_type} — ${freshSelected?.company_name}`
                  : freshSelected ? `${freshSelected.company_name}` : 'Augusta PM Agent'
                }
              </h1>
              <p className="page-sub">
                {result
                  ? `${outputs.length} output${outputs.length !== 1 ? 's' : ''} generated · ${new Date(result.timestamp).toLocaleTimeString()}`
                  : freshSelected ? `Select a transcript, then trigger an event` : 'Select a client to get started'
                }
              </p>
            </div>
            {result && (
              <button className="btn btn-outline btn-sm" onClick={() => setResult(null)}>Clear</button>
            )}
          </div>

          {/* Error */}
          {error && (
            <div className="error-bar fade-in">
              <div style={{ flex: 1 }}>
                <div className="error-title">Error</div>
                <div className="error-msg">{error}</div>
              </div>
              <button className="error-close" onClick={() => setError(null)}>×</button>
            </div>
          )}

          {/* Loading */}
          {loading && (
            <div className="loading-state fade-in">
              <div className="spinner"></div>
              <div>
                <div style={{ fontSize: 13, fontWeight: 500, color: 'var(--text)' }}>Agent is working…</div>
                <div style={{ fontSize: 12, color: 'var(--text3)', marginTop: 3 }}>
                  {activeEvent === 'transcript' && 'Analyzing transcript, extracting insights, generating outputs'}
                  {activeEvent === 'email' && 'Reading email, checking context, drafting response'}
                  {activeEvent === 'meeting' && (memory ? 'Checking memory, preparing meeting brief' : 'No prior context, generating research report')}
                </div>
              </div>
            </div>
          )}

          {/* Incoming email preview */}
          {!loading && result?.incoming_email && (
            <div className="email-preview fade-in">
              <div className="email-preview-label">Incoming Email</div>
              <div className="email-preview-subject">{result.incoming_email.subject}</div>
              <div className="email-preview-from">From: {result.incoming_email.from}</div>
              <div className="email-preview-body">{result.incoming_email.preview}</div>
            </div>
          )}

          {/* Transcript / branch info */}
          {!loading && result?.transcript_title && (
            <div className="context-banner fade-in">
              <strong>Transcript:</strong>
              <span>{result.transcript_title}</span>
              {result.branch === 'new_client'      && <span className="status-badge" style={{ marginLeft: 4 }}>New Client</span>}
              {result.branch === 'existing_client' && <span className="status-badge" style={{ marginLeft: 4 }}>Existing Client</span>}
            </div>
          )}

          {/* Outputs */}
          {!loading && outputs.length > 0 && (
            <div>
              {outputs.map((out, i) => (
                <OutputPanel key={i} output={out} defaultOpen={i === 0} />
              ))}
            </div>
          )}

          {/* History output view — when user clicks an item from history */}
          {!loading && !result && !error && historyOutput && (
            <div className="fade-in">
              <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 16 }}>
                <button
                  className="btn btn-outline btn-sm"
                  onClick={() => setHistoryOutput(null)}
                  style={{ gap: 4 }}
                >← Back</button>
                <span style={{ fontSize: 11, color: 'var(--text3)' }}>From history · {formatDate(historyOutput.created_at)}</span>
              </div>
              <OutputPanel output={historyOutput} defaultOpen={true} />
            </div>
          )}

          {/* Empty state */}
          {!loading && !result && !error && !historyOutput && (
            <div className="empty-state">
              <div className="empty-state-title">Augusta PM Agent</div>
              <div className="empty-state-desc">
                Select a client, choose a transcript, then trigger an event.
                The agent will generate emails, proposals, team plans, and briefings — with memory that evolves over time.
              </div>
              <div className="how-grid">
                {[
                  { title: 'Transcript',    desc: 'Extracts insights, drafts follow-up email, creates team plan and proposal' },
                  { title: 'Email Reply',   desc: 'Reads full context, generates a comprehensive response draft' },
                  { title: 'Meeting Prep',  desc: 'Briefing doc for known clients, research report for new ones' },
                  { title: 'Memory',        desc: 'Context persists across events — run all 3 transcripts to see it evolve' },
                ].map(item => (
                  <div key={item.title} className="how-card">
                    <div className="how-card-title">{item.title}</div>
                    <div className="how-card-desc">{item.desc}</div>
                  </div>
                ))}
              </div>
            </div>
          )}
        </main>

        {/* ── RIGHT SIDEBAR ── */}
        <aside className="right-panel">

          {/* Chat */}
          <div className="sidebar-section">
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 10 }}>
              <div className="sidebar-label" style={{ margin: 0 }}>Ask the Agent</div>
              {freshSelected && (
                <button
                  className="btn btn-outline btn-sm"
                  onClick={() => setShowChat(!showChat)}
                >
                  {showChat ? 'Hide' : 'Open chat'}
                </button>
              )}
            </div>
            {showChat && freshSelected ? (
              <ChatPanel clientId={freshSelected.client_id} companyName={freshSelected.company_name} />
            ) : (
              <div
                style={{
                  border: '1px solid var(--border)', borderRadius: 4,
                  padding: '20px 14px', textAlign: 'center',
                  cursor: freshSelected ? 'pointer' : 'default', background: '#ffffff',
                }}
                onClick={() => freshSelected && setShowChat(true)}
              >
                <div style={{ fontSize: 13, fontWeight: 500, color: 'var(--text)', marginBottom: 4 }}>Chat Interface</div>
                <div style={{ fontSize: 11.5, color: 'var(--text3)', lineHeight: 1.6 }}>
                  {freshSelected
                    ? 'Ask questions, refine outputs, explore context'
                    : 'Select a client to start chatting'}
                </div>
              </div>
            )}
          </div>

          {/* Output History */}
          <div className="sidebar-section">
            <div className="sidebar-label">Output History</div>
            <HistoryPanel
              clientId={freshSelected?.client_id || null}
              onOpen={openHistoryOutput}
              activeId={activeHistoryId}
            />
          </div>

          {/* Insights */}
          {result?.insights && (
            <div className="sidebar-section">
              <div className="sidebar-label">Agent Insights</div>
              <InsightsPanel insights={result.insights} />
            </div>
          )}

          {/* Suggested flow */}
          {!result && !historyOutput && (
            <div className="sidebar-section">
              <div className="sidebar-label">Suggested Flow</div>
              <div className="steps">
                {[
                  { n: '1', t: 'Meeting in 3 hours',    d: 'Start fresh — get research or prep brief' },
                  { n: '2', t: 'Run all 3 transcripts', d: 'Watch memory build, outputs evolve with context' },
                  { n: '3', t: 'Email reply came in',   d: 'See context-aware email response' },
                  { n: '4', t: 'Chat with the agent',   d: 'Ask questions, refine any output' },
                ].map(s => (
                  <div key={s.n} className="step">
                    <div className="step-num">{s.n}</div>
                    <div>
                      <div className="step-title">{s.t}</div>
                      <div className="step-desc">{s.d}</div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* Test data */}
          <div className="sidebar-section">
            <div className="sidebar-label">Test Data</div>
            <div style={{ fontSize: 11.5, color: 'var(--text3)', lineHeight: 1.8 }}>
              <div><span style={{ color: 'var(--text2)', fontWeight: 500 }}>FinoVa Capital</span> — Fintech · 3 transcripts</div>
              <div><span style={{ color: 'var(--text2)', fontWeight: 500 }}>MedBridge Health</span> — Healthcare · 3 transcripts</div>
            </div>
          </div>

        </aside>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
