<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Augusta PM Agent</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/marked@9/marked.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d0f1a;
    --bg2: #13162a;
    --bg3: #181c30;
    --card: #1e2235;
    --border: #252a45;
    --border2: #2d3154;
    --text: #e2e5f5;
    --text2: #8890b5;
    --text3: #5c6490;
    --accent: #6366f1;
    --accent2: #818cf8;
    --accent-bg: rgba(99,102,241,0.12);
    --green: #10b981;
    --green-bg: rgba(16,185,129,0.12);
    --blue: #3b82f6;
    --blue-bg: rgba(59,130,246,0.12);
    --purple: #a78bfa;
    --purple-bg: rgba(139,92,246,0.12);
    --yellow: #f59e0b;
    --yellow-bg: rgba(245,158,11,0.12);
    --pink: #f472b6;
    --pink-bg: rgba(236,72,153,0.12);
    --red: #ef4444;
    --red-bg: rgba(239,68,68,0.1);
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.5;
  }
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: var(--bg2); }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

  /* Markdown styles */
  .md h1 { font-size:1.3em; color:#fff; margin:1em 0 0.5em; font-weight:700; }
  .md h2 { font-size:1.1em; color:#fff; margin:1em 0 0.4em; font-weight:600; padding-bottom:0.3em; border-bottom:1px solid var(--border2); }
  .md h3 { font-size:0.95em; color:var(--accent2); margin:0.8em 0 0.3em; font-weight:600; }
  .md p { margin:0.6em 0; color:var(--text); }
  .md ul, .md ol { margin:0.4em 0; padding-left:1.4em; }
  .md li { margin:0.3em 0; color:var(--text); }
  .md strong { color:#fff; font-weight:600; }
  .md em { color:var(--text2); }
  .md code { background:rgba(99,102,241,0.15); color:var(--accent2); padding:0.1em 0.35em; border-radius:4px; font-size:0.85em; font-family:monospace; }
  .md pre { background:rgba(0,0,0,0.3); border:1px solid var(--border); border-radius:8px; padding:1em; overflow-x:auto; margin:0.6em 0; }
  .md pre code { background:none; padding:0; }
  .md blockquote { border-left:3px solid var(--accent); padding-left:1em; margin:0.6em 0; color:var(--text2); }
  .md table { width:100%; border-collapse:collapse; margin:0.8em 0; font-size:0.9em; }
  .md th { background:rgba(99,102,241,0.18); padding:0.45em 0.7em; text-align:left; border-bottom:1px solid var(--border2); color:var(--accent2); font-weight:600; }
  .md td { padding:0.45em 0.7em; border-bottom:1px solid rgba(37,42,69,0.5); }
  .md tr:hover td { background:rgba(255,255,255,0.025); }
  .md a { color:var(--accent2); text-decoration:underline; }
  .md hr { border:none; border-top:1px solid var(--border2); margin:1em 0; }

  /* Animations */
  @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
  @keyframes spin { to{transform:rotate(360deg)} }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
  @keyframes slideIn { from{opacity:0;transform:translateX(-8px)} to{opacity:1;transform:translateX(0)} }
  @keyframes glow { 0%,100%{box-shadow:0 0 5px rgba(99,102,241,0.3)} 50%{box-shadow:0 0 20px rgba(99,102,241,0.6)} }
  .fade-in { animation:fadeIn 0.3s ease-out; }
  .slide-in { animation:slideIn 0.25s ease-out; }
  .spin { animation:spin 0.8s linear infinite; }
  .pulse { animation:pulse 2s ease-in-out infinite; }
  .glow { animation:glow 2s ease-in-out infinite; }

  /* Layout */
  .app { display:flex; flex-direction:column; min-height:100vh; }
  .topbar {
    display:flex; align-items:center; justify-content:space-between;
    padding:0 24px; height:56px;
    background:rgba(13,15,26,0.95); border-bottom:1px solid var(--border);
    backdrop-filter:blur(12px); position:sticky; top:0; z-index:100;
  }
  .logo { display:flex; align-items:center; gap:10px; }
  .logo-icon {
    width:32px; height:32px; border-radius:9px;
    background:linear-gradient(135deg,#6366f1,#818cf8);
    display:flex; align-items:center; justify-content:center;
    font-size:16px; color:#fff; font-weight:700;
    box-shadow:0 0 20px rgba(99,102,241,0.4);
  }
  .logo-text { font-weight:700; font-size:15px; color:#fff; letter-spacing:-0.3px; }
  .logo-sub { font-size:12px; color:var(--text3); margin-left:4px; }
  .main { display:flex; flex:1; gap:0; }
  .sidebar { width:280px; min-width:280px; border-right:1px solid var(--border); background:var(--bg2); overflow-y:auto; display:flex; flex-direction:column; }
  .content { flex:1; overflow-y:auto; padding:20px 24px; }
  .right-panel { width:340px; min-width:340px; border-left:1px solid var(--border); background:var(--bg2); overflow-y:auto; display:flex; flex-direction:column; }

  /* Sections */
  .section { padding:16px; border-bottom:1px solid var(--border); }
  .section-title {
    font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.1em;
    color:var(--text3); margin-bottom:10px; display:flex; align-items:center; gap:6px;
  }
  .section-dot { width:6px; height:6px; border-radius:50%; background:currentColor; opacity:0.7; }

  /* Buttons */
  button { cursor:pointer; border:none; outline:none; font-family:inherit; }
  .btn { display:inline-flex; align-items:center; justify-content:center; gap:6px; border-radius:8px; font-size:13px; font-weight:500; transition:all 0.15s; padding:7px 14px; }
  .btn-ghost { background:rgba(255,255,255,0.05); color:var(--text2); border:1px solid var(--border2); }
  .btn-ghost:hover { background:rgba(255,255,255,0.08); color:var(--text); }
  .btn-danger { background:var(--red-bg); color:#f87171; border:1px solid rgba(239,68,68,0.25); font-size:11px; padding:5px 10px; }
  .btn-danger:hover { background:rgba(239,68,68,0.18); }
  .btn-accent { background:var(--accent); color:#fff; font-weight:600; }
  .btn-accent:hover { background:#4f52d6; }
  .btn-sm { padding:5px 10px; font-size:12px; }

  /* Client cards */
  .client-card {
    border-radius:10px; border:1px solid var(--border);
    background:var(--card); margin-bottom:8px;
    cursor:pointer; transition:all 0.15s;
    overflow:hidden;
  }
  .client-card:hover { border-color:rgba(99,102,241,0.35); background:var(--bg3); }
  .client-card.selected { border-color:rgba(99,102,241,0.5); background:rgba(99,102,241,0.08); box-shadow:0 0 0 1px rgba(99,102,241,0.2); }
  .client-header { padding:12px; display:flex; align-items:flex-start; gap:10px; }
  .client-avatar {
    width:36px; height:36px; border-radius:8px;
    background:rgba(255,255,255,0.07); display:flex; align-items:center; justify-content:center;
    font-weight:700; font-size:14px; color:var(--text2); flex-shrink:0;
  }
  .client-card.selected .client-avatar { background:rgba(99,102,241,0.25); color:var(--accent2); }
  .client-name { font-size:13px; font-weight:600; color:var(--text); }
  .client-sub { font-size:11px; color:var(--text2); margin-top:2px; }
  .client-tag {
    font-size:10px; padding:2px 7px; border-radius:999px;
    background:var(--green-bg); color:var(--green);
    border:1px solid rgba(16,185,129,0.3); font-weight:500;
  }

  /* Transcript pills */
  .transcript-list { padding:8px 12px 12px; border-top:1px solid var(--border); }
  .transcript-label { font-size:10px; color:var(--text3); font-weight:600; text-transform:uppercase; letter-spacing:0.08em; margin-bottom:6px; }
  .transcript-pill {
    display:flex; align-items:center; justify-content:space-between;
    padding:7px 10px; border-radius:7px; margin-bottom:4px;
    cursor:pointer; transition:all 0.15s; font-size:11px;
    border-left:2px solid transparent;
    background:rgba(255,255,255,0.03);
    color:var(--text2);
  }
  .transcript-pill:hover { background:rgba(99,102,241,0.1); color:var(--text); }
  .transcript-pill.selected { background:rgba(99,102,241,0.18); border-left-color:var(--accent); color:var(--accent2); }
  .transcript-date { color:rgba(140,148,192,0.45); font-size:10px; }

  /* Event trigger buttons */
  .event-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; }
  .event-btn {
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:8px; padding:14px 8px; border-radius:12px;
    border:1px solid transparent; transition:all 0.15s; cursor:pointer;
    background:rgba(255,255,255,0.04);
  }
  .event-btn:hover:not(:disabled) { transform:translateY(-1px); }
  .event-btn:active:not(:disabled) { transform:scale(0.97); }
  .event-btn:disabled { opacity:0.4; cursor:not-allowed; }
  .event-btn.active { transform:scale(1.02); }
  .event-btn .btn-icon { font-size:22px; }
  .event-btn .btn-label { font-size:11px; font-weight:600; text-align:center; line-height:1.3; }
  .event-btn .btn-sub { font-size:10px; opacity:0.65; text-align:center; }
  .event-btn-transcript { border-color:rgba(59,130,246,0.3); background:var(--blue-bg); color:var(--blue); }
  .event-btn-email { border-color:rgba(139,92,246,0.3); background:var(--purple-bg); color:var(--purple); }
  .event-btn-meeting { border-color:rgba(245,158,11,0.3); background:var(--yellow-bg); color:var(--yellow); }
  .event-btn-transcript.active { box-shadow:0 0 16px rgba(59,130,246,0.3); }
  .event-btn-email.active { box-shadow:0 0 16px rgba(139,92,246,0.3); }
  .event-btn-meeting.active { box-shadow:0 0 16px rgba(245,158,11,0.3); }

  /* Output panels */
  .output-panel { border-radius:12px; border:1px solid var(--border); overflow:hidden; margin-bottom:16px; }
  .output-header {
    display:flex; align-items:center; justify-content:space-between;
    padding:10px 14px; cursor:pointer; user-select:none;
    border-bottom:1px solid transparent; transition:all 0.15s;
  }
  .output-header:hover { filter:brightness(1.05); }
  .output-header-left { display:flex; align-items:center; gap:8px; }
  .output-title { font-size:13px; font-weight:600; }
  .output-body { padding:16px; overflow-y:auto; max-height:600px; }
  .output-email .output-header { background:var(--blue-bg); border-bottom-color:rgba(59,130,246,0.15); }
  .output-email .output-title { color:var(--blue); }
  .output-proposal .output-header { background:var(--purple-bg); border-bottom-color:rgba(139,92,246,0.15); }
  .output-proposal .output-title { color:var(--purple); }
  .output-team_plan .output-header { background:var(--green-bg); border-bottom-color:rgba(16,185,129,0.15); }
  .output-team_plan .output-title { color:var(--green); }
  .output-meeting_prep .output-header { background:var(--yellow-bg); border-bottom-color:rgba(245,158,11,0.15); }
  .output-meeting_prep .output-title { color:var(--yellow); }
  .output-research_report .output-header { background:var(--pink-bg); border-bottom-color:rgba(236,72,153,0.15); }
  .output-research_report .output-title { color:var(--pink); }

  /* Badge */
  .badge {
    display:inline-flex; align-items:center; font-size:10px; font-weight:600;
    padding:2px 8px; border-radius:999px; text-transform:capitalize;
  }
  .badge-green { background:var(--green-bg); color:var(--green); border:1px solid rgba(16,185,129,0.3); }
  .badge-blue { background:var(--blue-bg); color:var(--blue); border:1px solid rgba(59,130,246,0.3); }
  .badge-yellow { background:var(--yellow-bg); color:var(--yellow); border:1px solid rgba(245,158,11,0.3); }
  .badge-purple { background:var(--purple-bg); color:var(--purple); border:1px solid rgba(139,92,246,0.3); }
  .badge-pink { background:var(--pink-bg); color:var(--pink); border:1px solid rgba(236,72,153,0.3); }
  .badge-accent { background:var(--accent-bg); color:var(--accent2); border:1px solid rgba(99,102,241,0.3); }

  /* Memory panel */
  .memory-panel { border-radius:10px; border:1px solid var(--border); overflow:hidden; background:var(--card); }
  .memory-header {
    display:flex; align-items:center; justify-content:space-between;
    padding:10px 14px; background:var(--green-bg); cursor:pointer;
  }
  .memory-stats { display:grid; grid-template-columns:1fr 1fr 1fr; border-bottom:1px solid var(--border); }
  .memory-stat { padding:8px; text-align:center; }
  .memory-stat:not(:last-child) { border-right:1px solid var(--border); }
  .memory-stat-val { font-size:16px; font-weight:700; color:#fff; }
  .memory-stat-label { font-size:10px; color:var(--text3); margin-top:1px; }
  .memory-body { padding:12px; }

  /* Loading state */
  .loading-card {
    border-radius:14px; border:1px solid var(--border); background:var(--card);
    padding:48px 24px; display:flex; flex-direction:column; align-items:center; gap:16px;
    text-align:center;
  }
  .spinner-ring {
    width:48px; height:48px; border-radius:50%;
    border:3px solid rgba(99,102,241,0.2);
    border-top-color:var(--accent);
    animation:spin 0.9s linear infinite;
  }
  .loading-dots { display:flex; gap:6px; margin-top:8px; }
  .loading-dot {
    width:7px; height:7px; border-radius:50%; background:var(--accent);
    animation:pulse 1.4s ease-in-out infinite;
  }
  .loading-dot:nth-child(2) { animation-delay:0.2s; }
  .loading-dot:nth-child(3) { animation-delay:0.4s; }

  /* Empty state */
  .empty-state {
    border-radius:14px; border:1px solid var(--border); background:var(--card);
    padding:48px 24px; display:flex; flex-direction:column; align-items:center;
    gap:20px; text-align:center;
  }
  .empty-icon {
    width:64px; height:64px; border-radius:18px;
    background:linear-gradient(135deg,rgba(99,102,241,0.2),rgba(129,140,248,0.1));
    display:flex; align-items:center; justify-content:center; font-size:28px;
  }
  .how-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; width:100%; max-width:380px; margin-top:8px; }
  .how-card { background:rgba(255,255,255,0.03); border:1px solid var(--border); border-radius:10px; padding:12px; text-align:left; }
  .how-card-icon { font-size:18px; margin-bottom:6px; }
  .how-card-title { font-size:12px; font-weight:600; color:#fff; margin-bottom:3px; }
  .how-card-desc { font-size:11px; color:var(--text2); line-height:1.5; }

  /* Chat */
  .chat-wrap {
    display:flex; flex-direction:column; height:480px;
    border-radius:12px; border:1px solid var(--border);
    background:var(--card); overflow:hidden;
  }
  .chat-header {
    padding:10px 14px; background:var(--accent-bg);
    border-bottom:1px solid var(--border);
    display:flex; align-items:center; gap:8px;
    font-size:12px; font-weight:600; color:var(--accent2);
  }
  .chat-messages { flex:1; overflow-y:auto; padding:12px; display:flex; flex-direction:column; gap:10px; }
  .chat-empty { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; gap:12px; text-align:center; }
  .chat-empty-icon { font-size:32px; }
  .chat-suggestions { display:grid; grid-template-columns:1fr 1fr; gap:6px; width:100%; margin-top:4px; }
  .chat-suggestion {
    text-align:left; font-size:11px; padding:7px 9px; border-radius:7px;
    background:rgba(99,102,241,0.08); border:1px solid rgba(99,102,241,0.2);
    color:var(--text2); cursor:pointer; transition:all 0.15s; line-height:1.4;
  }
  .chat-suggestion:hover { background:rgba(99,102,241,0.16); color:var(--text); }
  .msg { display:flex; gap:8px; }
  .msg.user { flex-direction:row-reverse; }
  .msg-avatar {
    width:26px; height:26px; border-radius:50%; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    font-size:12px; margin-top:2px;
  }
  .msg.user .msg-avatar { background:rgba(99,102,241,0.3); }
  .msg.assistant .msg-avatar { background:rgba(16,185,129,0.2); }
  .msg-bubble {
    max-width:82%; padding:9px 12px; font-size:12.5px; line-height:1.55;
  }
  .msg.user .msg-bubble {
    background:rgba(99,102,241,0.18); border-radius:14px 3px 14px 14px; color:var(--text);
  }
  .msg.assistant .msg-bubble {
    background:rgba(255,255,255,0.04); border-radius:3px 14px 14px 14px;
  }
  .chat-input-wrap { padding:10px; border-top:1px solid var(--border); display:flex; gap:8px; align-items:flex-end; }
  .chat-input {
    flex:1; resize:none; border-radius:9px; padding:8px 12px;
    background:rgba(255,255,255,0.05); border:1px solid var(--border2);
    color:var(--text); font-size:12.5px; font-family:inherit;
    outline:none; max-height:90px; min-height:36px;
    transition:border-color 0.15s;
  }
  .chat-input:focus { border-color:rgba(99,102,241,0.4); }
  .chat-input::placeholder { color:var(--text3); }
  .chat-send {
    width:34px; height:34px; border-radius:8px; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    background:var(--accent); color:#fff; transition:all 0.15s; font-size:14px;
  }
  .chat-send:hover:not(:disabled) { background:#4f52d6; }
  .chat-send:disabled { background:rgba(99,102,241,0.25); cursor:not-allowed; }

  /* Insights panel */
  .insight-panel { border-radius:10px; border:1px solid var(--border); background:var(--card); overflow:hidden; }
  .insight-section { padding:10px 12px; border-bottom:1px solid var(--border); }
  .insight-section:last-child { border-bottom:none; }
  .insight-label { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.08em; color:var(--text3); margin-bottom:6px; }
  .insight-item { display:flex; align-items:flex-start; gap:6px; margin-bottom:5px; font-size:11.5px; }
  .insight-bullet { flex-shrink:0; margin-top:2px; }

  /* Error */
  .error-bar {
    display:flex; align-items:flex-start; gap:10px; padding:12px 16px;
    background:var(--red-bg); border:1px solid rgba(239,68,68,0.25);
    border-radius:10px; margin-bottom:16px;
  }
  .error-close { margin-left:auto; background:none; border:none; color:var(--text2); cursor:pointer; font-size:16px; padding:0; flex-shrink:0; }

  /* Incoming email preview */
  .email-preview {
    background:var(--purple-bg); border:1px solid rgba(139,92,246,0.25);
    border-radius:10px; padding:12px 14px; margin-bottom:14px;
  }
  .email-preview-label { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.08em; color:var(--purple); margin-bottom:6px; }

  /* History items */
  .history-item {
    display:flex; align-items:center; justify-content:space-between;
    padding:8px 12px; border-bottom:1px solid var(--border); font-size:11px;
  }
  .history-item:last-child { border-bottom:none; }
  .history-dot { width:6px; height:6px; border-radius:50%; background:var(--accent); margin-right:6px; flex-shrink:0; }

  /* Steps guide */
  .steps { display:flex; flex-direction:column; gap:12px; }
  .step { display:flex; gap:10px; align-items:flex-start; }
  .step-num {
    width:22px; height:22px; border-radius:50%; flex-shrink:0;
    background:rgba(99,102,241,0.2); color:var(--accent2);
    display:flex; align-items:center; justify-content:center;
    font-size:11px; font-weight:700;
  }

  /* Misc */
  .tag-bar { display:flex; align-items:center; gap:6px; font-size:11px; color:var(--text2); margin-top:4px; }
  .divider { height:1px; background:var(--border); margin:16px 0; }
  .topbar-chip {
    display:flex; align-items:center; gap:6px; padding:5px 12px;
    border-radius:999px; background:var(--accent-bg); border:1px solid rgba(99,102,241,0.25);
    font-size:12px; color:var(--accent2); font-weight:500;
  }
  .copy-btn {
    display:inline-flex; align-items:center; gap:4px; font-size:11px;
    padding:3px 8px; border-radius:5px; background:rgba(255,255,255,0.06);
    border:1px solid var(--border2); color:var(--text2); cursor:pointer; transition:all 0.15s;
  }
  .copy-btn:hover { background:rgba(255,255,255,0.1); color:var(--text); }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;
const API = '';

// ─── API helpers ─────────────────────────────────────────────
async function apiFetch(path, opts = {}) {
  const res = await fetch(API + path, {
    headers: { 'Content-Type': 'application/json' },
    ...opts,
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({ detail: res.statusText }));
    throw new Error(err.detail || 'Request failed');
  }
  return res.json();
}

// ─── Markdown renderer ───────────────────────────────────────
function Markdown({ content }) {
  const html = marked.parse(content || '', { breaks: true });
  return <div className="md" dangerouslySetInnerHTML={{ __html: html }} />;
}

// ─── Copy button ─────────────────────────────────────────────
function CopyBtn({ text }) {
  const [copied, setCopied] = useState(false);
  const copy = (e) => {
    e.stopPropagation();
    navigator.clipboard.writeText(text);
    setCopied(true);
    setTimeout(() => setCopied(false), 2000);
  };
  return (
    <button className="copy-btn" onClick={copy}>
      {copied ? '✓ Copied' : '⧉ Copy'}
    </button>
  );
}

      </div>
      <div className="memory-stats">

          { label: 'Events', val: (memory.events || []).length },
          { label: 'Open Items', val: openItems.length },
          { label: 'Decisions', val: (memory.decisions || []).length },
        ].map(s => (

              <div className="insight-label">Open Items</div>

// ─── Chat Panel ───────────────────────────────────────────────
function ChatPanel({ clientId, companyName }) {
  const [msgs, setMsgs] = useState([]);
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const bottomRef = useRef(null);
  const inputRef = useRef(null);

  useEffect(() => { bottomRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [msgs]);

  const send = async (text) => {
    const t = (text || input).trim();
    if (!t || loading) return;
    const newMsgs = [...msgs, { role: 'user', content: t }];
    setMsgs(newMsgs);
    setInput('');
    setLoading(true);
    try {
      const data = await apiFetch('/api/chat', {
        method: 'POST',
        body: JSON.stringify({ client_id: clientId, messages: newMsgs }),
      });
      setMsgs([...newMsgs, { role: 'assistant', content: data.response }]);
    } catch (e) {
      setMsgs([...newMsgs, { role: 'assistant', content: `❌ ${e.message}` }]);
    } finally {
      setLoading(false);
    }
  };

  const SUGGESTIONS = [
    'What are the open action items?',
    'What risks should I watch?',
    'Summarize project status',
    'What to prep for next meeting?',
  ];

  return (
    <div className="chat-wrap">
      <div className="chat-header">
        <span>💬</span> Chat — {companyName}
      </div>
      <div className="chat-messages">
        {msgs.length === 0 ? (
          <div className="chat-empty">
            <div className="chat-empty-icon">🤖</div>
            <div>
              <div style={{ fontSize: 13, fontWeight: 600, color: 'var(--text)' }}>Ask about {companyName}</div>
              <div style={{ fontSize: 11, color: 'var(--text3)', marginTop: 3 }}>I have full project context</div>
            </div>
            <div className="chat-suggestions">
              {SUGGESTIONS.map(q => (
                <button key={q} className="chat-suggestion" onClick={() => send(q)}>{q}</button>
              ))}
            </div>
          </div>
        ) : (
          msgs.map((m, i) => (
            <div key={i} className={`msg ${m.role}`}>
              <div className="msg-avatar">{m.role === 'user' ? '👤' : '🤖'}</div>
              <div className="msg-bubble">
                {m.role === 'assistant' ? <Markdown content={m.content} /> : m.content}
              </div>
            </div>
          ))
        )}
        {loading && (
          <div className="msg assistant">
            <div className="msg-avatar">🤖</div>
            <div className="msg-bubble">
              <span className="spin" style={{ display: 'inline-block', width: 14, height: 14, border: '2px solid rgba(16,185,129,0.3)', borderTopColor: 'var(--green)', borderRadius: '50%' }}></span>
            </div>
          </div>
        )}
        <div ref={bottomRef} />
      </div>
      <div className="chat-input-wrap">
        <textarea
          ref={inputRef}
          className="chat-input"
          placeholder="Ask about this engagement… (Enter to send)"
          value={input}
          onChange={e => setInput(e.target.value)}
          onKeyDown={e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } }}
          rows={1}
          onInput={e => { e.target.style.height = 'auto'; e.target.style.height = Math.min(e.target.scrollHeight, 90) + 'px'; }}
        />
        <button className="chat-send" disabled={!input.trim() || loading} onClick={() => send()}>➤</button>
      </div>
    </div>
  );
}

// ─── Main App ─────────────────────────────────────────────────
function App() {
  const [clients, setClients] = useState([]);
  const [selected, setSelected] = useState(null);
  const [selectedTxId, setSelectedTxId] = useState(null);
  const [loading, setLoading] = useState(false);
  const [activeEvent, setActiveEvent] = useState(null);
  const [result, setResult] = useState(null);
  const [error, setError] = useState(null);
  const [memory, setMemory] = useState(null);
  const [history, setHistory] = useState([]);
  const [showChat, setShowChat] = useState(false);

  const loadClients = useCallback(async () => {
    try {
      const data = await apiFetch('/api/clients');
      setClients(data);
    } catch (e) { console.error(e); }
  }, []);

  const loadMemory = useCallback(async () => {
    if (!selected) return setMemory(null);
    try {
      const d = await apiFetch(`/api/clients/${selected.client_id}/memory`);
      setMemory(d.memory || null);
    } catch { setMemory(null); }
  }, [selected]);

  useEffect(() => { loadClients(); }, []);
  useEffect(() => { loadMemory(); }, [selected]);

  const selectClient = async (c) => {
    setSelected(c);
    setSelectedTxId(c.transcripts[0]?.id || null);
    setResult(null);
    setError(null);
    setShowChat(false);
    try {
      const d = await apiFetch(`/api/clients/${c.client_id}/memory`);
      setMemory(d.memory || null);
    } catch { setMemory(null); }
  };

  const trigger = async (type) => {
    if (!selected || loading) return;
    setLoading(true);
    setActiveEvent(type);
    setError(null);
    setResult(null);
    try {
      let res;
      if (type === 'transcript') {
        res = await apiFetch('/api/events/transcript', {
          method: 'POST',
          body: JSON.stringify({ client_id: selected.client_id, transcript_id: selectedTxId }),
        });
      } else if (type === 'email') {
        res = await apiFetch('/api/events/email', {
          method: 'POST',
          body: JSON.stringify({ client_id: selected.client_id }),
        });
      } else {
        res = await apiFetch('/api/events/meeting', {
          method: 'POST',
          body: JSON.stringify({ client_id: selected.client_id }),
        });
      }
      setResult(res);
      setHistory(h => [{ id: Date.now(), type, client: selected.company_name, time: new Date().toLocaleTimeString(), outputs: Object.keys(res.outputs || {}).length }, ...h].slice(0, 8));
      await loadMemory();
      await loadClients();
    } catch (e) {
      setError(e.message);
    } finally {
      setLoading(false);
      setActiveEvent(null);
    }
  };

  const resetMem = async (clientId) => {
    await apiFetch('/api/memory/reset', {
      method: 'POST',
      body: JSON.stringify({ client_id: clientId || null }),
    });
    await loadClients();
    await loadMemory();
    setResult(null);
  };

  const outputs = result ? Object.values(result.outputs || {}) : [];
  const EVENT_LABELS = { transcript: '📝 Transcript', email: '📧 Email Reply', meeting: '📅 Meeting Prep' };

  // Find the currently selected client's fresh data (with memory)
  const freshSelected = selected ? (clients.find(c => c.client_id === selected.client_id) || selected) : null;

  return (
    <div className="app">
      {/* ── Top Bar ── */}
      <header className="topbar">
        <div className="logo">
          <div className="logo-icon">A</div>
          <span className="logo-text">Augusta</span>
          <span className="logo-sub">PM Agent</span>
        </div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 14 }}>
          {loading && (
            <div style={{ display: 'flex', alignItems: 'center', gap: 8, fontSize: 12, color: 'var(--accent2)' }}>
              <span className="spin" style={{ display: 'inline-block', width: 16, height: 16, border: '2px solid rgba(99,102,241,0.25)', borderTopColor: 'var(--accent)', borderRadius: '50%' }}></span>
              Agent working…
            </div>
          )}
          {history.length > 0 && (
            <div style={{ fontSize: 11, color: 'var(--text3)', display: 'flex', alignItems: 'center', gap: 5 }}>
              <span style={{ color: 'var(--green)', fontSize: 8 }}>●</span>
              {history.length} event{history.length !== 1 ? 's' : ''} this session
            </div>
          )}
          {freshSelected && (
            <div className="topbar-chip">
              <span style={{ width: 18, height: 18, borderRadius: 5, background: 'rgba(99,102,241,0.35)', display: 'inline-flex', alignItems: 'center', justifyContent: 'center', fontWeight: 700, fontSize: 11 }}>
                {freshSelected.company_name.charAt(0)}
              </span>
              {freshSelected.company_name}
            </div>
          )}
        </div>
      </header>

      {/* ── Main ── */}
      <div className="main">
        {/* ── LEFT SIDEBAR ── */}
        <aside className="sidebar">
          {/* Clients */}
          <div className="section">
            <div className="section-title" style={{ color: 'var(--accent)' }}>
              <span className="section-dot"></span> Clients
            </div>
            {clients.map(c => {
              const isSel = selected?.client_id === c.client_id;
              const hasMem = !!c.memory;
              return (
                <div key={c.client_id} className={`client-card ${isSel ? 'selected' : ''}`} onClick={() => selectClient(c)}>
                  <div className="client-header">
                    <div className="client-avatar">{c.company_name.charAt(0)}</div>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 6 }}>
                        <div className="client-name">{c.company_name}</div>
                        <div style={{ display: 'flex', gap: 4, alignItems: 'center', flexShrink: 0 }}>
                          {hasMem && <span className="client-tag">Memory</span>}

                            onClick={e => { e.stopPropagation(); resetMem(c.client_id); }}
                            title="Clear memory"
                          >🗑</button>
                        </div>
                      </div>
                      <div className="client-sub">👤 {c.client_name}</div>
                      <div className="tag-bar">🏷 {c.industry}</div>
                    </div>
                  </div>
                  {isSel && c.transcripts.length > 0 && (
                    <div className="transcript-list">
                      <div className="transcript-label">Select Transcript</div>
                      {c.transcripts.map(t => (
                        <div

                        >

                          <span className="transcript-date">{t.date}</span>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              );
            })}
          </div>

          {/* Event Triggers */}
          <div className="section">
            <div className="section-title" style={{ color: 'var(--green)' }}>
              <span className="section-dot" style={{ background: 'var(--green)' }}></span> Trigger Event

            <div className="event-grid">

          {history.length > 0 && (
            <div className="section">
              <div className="section-title" style={{ color: 'var(--yellow)' }}>
                <span className="section-dot" style={{ background: 'var(--yellow)' }}></span> Recent Activity

              <div style={{ background: 'var(--card)', borderRadius: 10, border: '1px solid var(--border)', overflow: 'hidden' }}>

        {/* ── CENTER CONTENT ── */}

            </div>
            {result && (
              <button className="btn btn-ghost btn-sm" onClick={() => setResult(null)}>↺ Clear</button>
            )}
          </div>

          {/* Error */}
          {error && (
            <div className="error-bar fade-in">
              <span style={{ fontSize: 16 }}>⚠️</span>
              <div>
                <div style={{ fontWeight: 600, fontSize: 13, color: '#f87171' }}>Agent Error</div>
                <div style={{ fontSize: 12, color: 'var(--text2)', marginTop: 2 }}>{error}</div>
              </div>
              <button className="error-close" onClick={() => setError(null)}>×</button>
            </div>
          )}

          {/* Loading */}
          {loading && (
            <div className="loading-card fade-in">
              <div className="spinner-ring"></div>
              <div>
                <div style={{ fontSize: 15, fontWeight: 600, color: '#fff' }}>Agent is working…</div>
                <div style={{ fontSize: 12, color: 'var(--text2)', marginTop: 4 }}>
                  {activeEvent === 'transcript' && 'Analyzing transcript · extracting insights · generating outputs'}
                  {activeEvent === 'email' && 'Reading email · checking context · drafting response'}
                  {activeEvent === 'meeting' && (memory ? 'Checking memory · preparing meeting brief' : 'No prior context · generating research report')}
                </div>
              </div>
              <div className="loading-dots">
                <div className="loading-dot"></div>
                <div className="loading-dot"></div>
                <div className="loading-dot"></div>
              </div>
            </div>
          )}

          {/* Incoming email preview */}
          {!loading && result?.incoming_email && (
            <div className="email-preview fade-in">
              <div className="email-preview-label">📬 Incoming Email</div>
              <div style={{ fontWeight: 600, fontSize: 13, color: 'var(--text)' }}>{result.incoming_email.subject}</div>
              <div style={{ fontSize: 11, color: 'var(--text2)', marginTop: 3 }}>From: {result.incoming_email.from}</div>
              <div style={{ fontSize: 11.5, color: 'var(--text2)', marginTop: 6, lineHeight: 1.6 }}>{result.incoming_email.preview}</div>
            </div>
          )}

          {/* Transcript / branch info */}
          {!loading && result?.transcript_title && (
            <div style={{ background: 'var(--blue-bg)', border: '1px solid rgba(59,130,246,0.2)', borderRadius: 9, padding: '9px 14px', marginBottom: 14, display: 'flex', alignItems: 'center', gap: 8, fontSize: 12 }} className="fade-in">
              <span>📝</span>
              <span style={{ color: 'var(--blue)', fontWeight: 600 }}>Transcript: </span>
              <span style={{ color: 'var(--text)' }}>{result.transcript_title}</span>
              {result.branch === 'new_client' && <span className="badge badge-pink" style={{ marginLeft: 4 }}>New Client</span>}
              {result.branch === 'existing_client' && <span className="badge badge-green" style={{ marginLeft: 4 }}>Existing Client</span>}
            </div>
          )}

          {/* Outputs */}
          {!loading && outputs.length > 0 && (
            <div>
              {outputs.map((out, i) => (
                <OutputPanel key={i} output={out} defaultOpen={i === 0} />
              ))}
            </div>
          )}

          {/* Empty state */}
          {!loading && !result && !error && (
            <div className="empty-state">
              <div className="empty-icon">⚡</div>
              <div>
                <h2 style={{ fontSize: 20, fontWeight: 700, color: '#fff', marginBottom: 8 }}>Augusta PM Agent</h2>
                <p style={{ fontSize: 13, color: 'var(--text2)', maxWidth: 440, lineHeight: 1.7 }}>
                  Select a client, choose a transcript, then trigger an event.
                  The AI agent will automatically generate emails, proposals, team plans, and briefings — with memory that evolves over time.
                </p>
              </div>
              <div className="how-grid">
                {[
                  { icon: '📝', title: 'Transcript', desc: 'Extracts insights, drafts follow-up email, creates team plan & proposal' },
                  { icon: '📧', title: 'Email Reply', desc: 'Reads full context, generates a comprehensive response draft' },
                  { icon: '📅', title: 'Meeting Prep', desc: 'Briefing doc for known clients, research report for new ones' },
                  { icon: '💾', title: 'Memory', desc: 'Context persists across events — run all 3 transcripts to see it evolve' },
                ].map(item => (
                  <div key={item.title} className="how-card">
                    <div className="how-card-icon">{item.icon}</div>
                    <div className="how-card-title">{item.title}</div>
                    <div className="how-card-desc">{item.desc}</div>
                  </div>
                ))}
              </div>
            </div>
          )}
        </main>

        {/* ── RIGHT SIDEBAR ── */}
        <aside className="right-panel">
          {/* Chat toggle */}
          <div className="section">
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 10 }}>
              <div className="section-title" style={{ color: 'var(--accent2)', margin: 0 }}>
                <span className="section-dot" style={{ background: 'var(--accent)' }}></span> Ask the Agent
              </div>
              {freshSelected && (
                <button
                  className="btn btn-ghost btn-sm"
                  style={{ fontSize: 11, padding: '4px 10px', background: showChat ? 'rgba(99,102,241,0.2)' : undefined }}
                  onClick={() => setShowChat(!showChat)}
                >
                  {showChat ? 'Hide' : 'Open Chat'}
                </button>
              )}
            </div>
            {showChat && freshSelected ? (
              <ChatPanel clientId={freshSelected.client_id} companyName={freshSelected.company_name} />
            ) : (
              <div
                style={{ background: 'var(--card)', borderRadius: 10, border: '1px solid var(--border)', padding: '24px 16px', textAlign: 'center', cursor: freshSelected ? 'pointer' : 'default' }}
                onClick={() => freshSelected && setShowChat(true)}
              >
                <div style={{ fontSize: 28, marginBottom: 8 }}>💬</div>
                <div style={{ fontSize: 13, fontWeight: 600, color: 'var(--text)' }}>Chat Interface</div>
                <div style={{ fontSize: 11, color: 'var(--text3)', marginTop: 4, lineHeight: 1.5 }}>
                  {freshSelected ? 'Ask questions about this engagement, refine outputs, explore context' : 'Select a client to chat about their engagement'}
                </div>
              </div>
            )}
          </div>

          {/* Insights */}
          {result?.insights && (
            <div className="section">
              <div className="section-title" style={{ color: 'var(--pink)', marginBottom: 10 }}>
                <span className="section-dot" style={{ background: 'var(--pink)' }}></span> Agent Insights
              </div>
              <InsightsPanel insights={result.insights} />
            </div>
          )}

          {/* How it works guide */}
          {!result && (
            <div className="section">
              <div className="section-title" style={{ color: 'var(--yellow)', marginBottom: 10 }}>
                <span className="section-dot" style={{ background: 'var(--yellow)' }}></span> Suggested Flow
              </div>
              <div className="steps">
                {[
                  { n: '1', t: 'Meeting in 3 hours', d: 'Start fresh — get research or prep brief' },
                  { n: '2', t: 'Run all 3 transcripts', d: 'Watch memory build, outputs evolve with context' },
                  { n: '3', t: 'Email reply came in', d: 'See context-aware email response' },
                  { n: '4', t: 'Chat with the agent', d: 'Ask questions, refine any output' },
                ].map(s => (
                  <div key={s.n} className="step">
                    <div className="step-num">{s.n}</div>
                    <div>
                      <div style={{ fontSize: 12, fontWeight: 600, color: 'var(--text)' }}>{s.t}</div>
                      <div style={{ fontSize: 11, color: 'var(--text3)', marginTop: 2 }}>{s.d}</div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* Test clients info */}
          <div className="section" style={{ marginTop: 'auto' }}>
            <div className="section-title" style={{ color: 'var(--text3)' }}>
              <span className="section-dot"></span> Test Data
            </div>
            <div style={{ fontSize: 11, color: 'var(--text3)', lineHeight: 1.7 }}>
              <div><strong style={{ color: 'var(--text2)' }}>FinoVa Capital</strong> — Fintech · 3 transcripts · 1 email</div>
              <div style={{ marginTop: 4 }}>Kickoff → Tech Deep-Dive → SOW Negotiation → Email re: integration limits</div>
              <div style={{ marginTop: 8 }}><strong style={{ color: 'var(--text2)' }}>MedBridge Health</strong> — Healthcare · 3 transcripts · 1 email</div>
              <div style={{ marginTop: 4 }}>Discovery → Architecture Workshop → Kickoff → Email re: access setup</div>
            </div>
          </div>
        </aside>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
